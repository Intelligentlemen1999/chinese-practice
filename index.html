<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chinese Practice">
<meta name="theme-color" content="#0f0f14">
<title>Chinese Practice — HSK Reading</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0f0f14;
  color: #e8e6f0;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: max(env(safe-area-inset-top), 20px) 16px max(env(safe-area-inset-bottom), 20px);
  -webkit-overflow-scrolling: touch;
}

h1 {
  font-size: 13px;
  font-weight: 500;
  color: #7c7a8e;
  margin-bottom: 16px;
  margin-top: 8px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* ── CHAPTER SWITCHER ── */
.chapter-switcher {
  display:flex; gap:6px; margin-bottom:10px;
  width:100%; max-width:500px;
}
.ch-btn {
  flex:1; padding:7px 6px;
  background:#141420; border:1px solid #2e2c3e;
  border-radius:10px; color:#5a5870;
  font-size:11px; font-weight:500; cursor:pointer;
  transition:all .15s; line-height:1.35; text-align:center;
  touch-action:manipulation; min-height:40px; white-space:nowrap;
}
.ch-btn:hover  { border-color:#4e4c5e; color:#9a88cc; background:#1a1828; }
.ch-btn.active { border-color:#7c5cbf; color:#c9b8ff; background:#1e1a2e; }
.ch-btn .ch-num  { font-size:9px; color:inherit; opacity:.7; display:block; }
.ch-btn .ch-name { font-size:11px; }

/* ── SRS STATS BAR ── */
.srs-stats {
  display:flex; gap:6px; justify-content:center; align-items:center;
  margin-bottom:12px; min-height:26px; flex-wrap:wrap;
}
.srs-pill {
  padding:3px 11px; border-radius:20px;
  font-size:12px; font-weight:600; letter-spacing:.02em;
}
.srs-due  { background:#3a1515; color:#e05555; }
.srs-new  { background:#152030; color:#4a9fe0; }
.srs-done { background:#152515; color:#4aad7a; }
.srs-sep  { color:#2e2c3e; font-size:14px; }

/* ── SRS BADGES on word list ── */
.srs-badge {
  display:inline-block; font-size:9px; padding:1px 5px; border-radius:4px;
  font-weight:600; letter-spacing:.04em; margin-top:3px; text-transform:uppercase;
}
.srs-badge.new      { background:#1a2a3a; color:#4a9fe0; }
.srs-badge.learning { background:#2a1f10; color:#d4943a; }
.srs-badge.review   { background:#1a2a1a; color:#4aad7a; }
.srs-badge.mastered { background:#221a33; color:#c9b8ff; }

/* ── CARD ── */
.card {
  background: #1a1a24;
  border: 1px solid #2e2c3e;
  border-radius: 20px;
  width: 100%;
  max-width: 500px;
  padding: 24px 20px 22px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.progress {
  font-size: 12px; color: #4e4c5e;
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 10px;
}
.progress-bar { flex:1; height:3px; background:#2e2c3e; border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:#7c5cbf; border-radius:2px; transition:width 0.4s; }

.pinyin  { font-size:36px; font-weight:300; color:#c9b8ff; letter-spacing:.04em; margin-bottom:4px; min-height:46px; }
.pos     { font-size:13px; color:#5a5870; margin-bottom:10px; min-height:18px; }
.english { font-size:15px; color:#8a889e; margin-bottom:16px; min-height:20px; }

.answer-area {
  background:#0f0f14; border:2px dashed #2e2c3e; border-radius:14px;
  padding:20px 16px; margin-bottom:14px; min-height:84px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:border-color .2s;
  touch-action: manipulation;
}
.answer-area:hover { border-color:#4e4c5e; }
.answer-area.revealed { border:2px solid #3d3a52; cursor:default; background:#141420; }
.answer-hint { font-size:13px; color:#3a384a; }
.hanzi { font-size:54px; color:#f0eeff; letter-spacing:.1em; line-height:1.1; }

/* ── BUTTONS ── */
.btn-row { display:flex; gap:10px; }
button {
  flex:1; padding:14px 12px; border-radius:12px; border:none;
  font-size:15px; font-weight:500; cursor:pointer;
  transition:opacity .15s, transform .1s;
  touch-action: manipulation;
  min-height: 48px;
}
button:active { transform:scale(.97); }
button:disabled { opacity:.3; cursor:default; transform:none; }

#btn-reveal { background:#7c5cbf; color:#fff; }
#btn-reveal:hover:not(:disabled) { background:#8d6dd0; }

.rating-row { display:none; gap:10px; margin-top:10px; }
.rating-row.visible { display:flex; }
#btn-again { background:#3a1a1a; color:#f08080; border:1px solid #5a2a2a; }
#btn-again:hover:not(:disabled) { background:#4a2020; }
#btn-good  { background:#1a3a22; color:#80d080; border:1px solid #2a5a32; }
#btn-good:hover:not(:disabled)  { background:#203a28; }

/* ── TAB BAR ── */
.tab-bar {
  display:none; gap:6px; margin-top:12px;
}
.tab-bar.visible { display:flex; }

.tab-btn {
  flex:1; padding:12px 6px; border-radius:10px;
  background:#141420; border:1px solid #2e2c3e;
  color:#5a5870; font-size:12px; font-weight:500; cursor:pointer;
  transition:all .15s; touch-action:manipulation; min-height:46px;
}
.tab-btn:hover  { border-color:#4e4c5e; color:#9a88cc; background:#1a1828; }
.tab-btn.active { border-color:#7c5cbf; color:#c9b8ff; background:#1e1a2e; }

/* ── TAB CONTENT ── */
.tab-content {
  display:none; margin-top:10px;
  background:#0f0f14; border:1px solid #2e2c3e;
  border-radius:14px; overflow:hidden;
}
.tab-content.visible { display:block; }

/* — Strokes tab — */
.stroke-inner { padding:16px; }
.stroke-chars { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }
.stroke-char-box { display:flex; flex-direction:column; align-items:center; gap:5px; }
.stroke-char-box svg { border-radius:8px; background:#1a1a24; }
.stroke-char-label { font-size:10px; color:#5a5870; }
.stroke-actions { display:flex; gap:8px; margin-top:12px; justify-content:center; }
.stroke-act-btn {
  padding:6px 14px; background:#1e1a30; border:1px solid #3a3650;
  border-radius:8px; color:#9a88cc; font-size:12px; cursor:pointer; flex:none;
}
.stroke-act-btn:hover { background:#2a2540; }

/* — Examples tab — */
.examples-inner { padding:14px 16px; }
.example-item {
  padding:10px 0;
  border-bottom:1px solid #1e1c2e;
  text-align:left;
}
.example-item:last-child { border-bottom:none; }
.ex-zh { font-size:17px; color:#f0eeff; margin-bottom:3px; line-height:1.4; }
.ex-py { font-size:12px; color:#7a6aaa; font-style:italic; margin-bottom:3px; }
.ex-en { font-size:12px; color:#5a5870; }

/* — Practice tab — */
.practice-inner { padding:16px; text-align:left; }
.practice-prompt {
  font-size:13px; color:#7a6aaa; margin-bottom:10px;
}
.practice-prompt strong { color:#c9b8ff; }

textarea#my-sentence {
  width:100%; min-height:72px;
  background:#141420; border:1px solid #3a3650;
  border-radius:10px; padding:12px;
  color:#e8e6f0; font-size:16px; font-family:inherit;
  resize:vertical; outline:none; transition:border-color .2s;
}
textarea#my-sentence:focus { border-color:#7c5cbf; }
textarea#my-sentence::placeholder { color:#3a384a; }

.check-row { display:flex; gap:8px; margin-top:10px; align-items:center; }
#btn-check {
  background:#7c5cbf; color:#fff; border:none;
  border-radius:10px; padding:10px 18px;
  font-size:13px; font-weight:600; cursor:pointer; flex:none;
  transition:background .15s;
}
#btn-check:hover { background:#8d6dd0; }
#btn-check:disabled { opacity:.4; cursor:default; }

.server-hint {
  font-size:11px; color:#4a4860; flex:1;
  line-height:1.4;
}
.server-hint a { color:#7c5cbf; text-decoration:none; }

/* AI response box */
.ai-response {
  display:none;
  margin-top:12px;
  background:#141420;
  border-radius:10px;
  padding:12px 14px;
  font-size:13px;
  line-height:1.6;
  border-left:3px solid #7c5cbf;
}
.ai-response.visible { display:block; }
.ai-rating {
  font-size:15px; font-weight:600; margin-bottom:6px;
}
.ai-rating.correct   { color:#80d080; }
.ai-rating.error     { color:#f08080; }
.ai-rating.almost    { color:#f0c070; }
.ai-corrected {
  font-size:15px; color:#f0eeff; margin-bottom:6px;
  background:#1e1c2e; border-radius:8px; padding:8px 10px;
}
.ai-feedback { font-size:12px; color:#7a6aaa; }
.ai-loading  { color:#5a5870; font-style:italic; }
.ai-error    { color:#f08080; font-size:12px; }

/* — Draw canvas — */
.draw-toggle-btn {
  width:100%; padding:10px; margin-bottom:12px;
  background:#141420; border:1px dashed #2e2c3e;
  border-radius:10px; color:#5a5870; font-size:14px;
  cursor:pointer; touch-action:manipulation; min-height:44px;
  transition:all .15s; letter-spacing:.02em;
}
.draw-toggle-btn:hover, .draw-toggle-btn.open {
  border-color:#7c5cbf; color:#c9b8ff; background:#1a1828; border-style:solid;
}
.draw-wrap {
  margin:0 0 12px; padding:12px 12px 10px;
  background:rgba(10,8,22,0.65); border-radius:14px;
  border:1.5px solid rgba(124,92,191,0.28);
}
#draw-canvas {
  display:block; width:100%;
  background:#07070d; border-radius:10px;
  cursor:default; touch-action:auto; user-select:none;
  transition:background .2s, box-shadow .2s;
  box-shadow:0 0 0 1.5px rgba(124,92,191,0.22), 0 4px 20px rgba(0,0,0,0.45);
}
.draw-colors {
  display:flex; gap:9px; margin-top:10px;
  justify-content:center; align-items:center; flex-wrap:wrap;
}
.draw-action-btn {
  padding:6px 13px; background:#1e1a30; border:1px solid #3a3650;
  border-radius:8px; color:#9a88cc; font-size:13px; cursor:pointer;
  touch-action:manipulation; min-height:34px; white-space:nowrap;
  transition:all .15s; margin-left:4px;
}
.draw-action-btn:hover { background:#2a2540; color:#c9b8ff; border-color:#7c5cbf; }
.draw-color-btn {
  width:26px; height:26px; border-radius:50%;
  border:2.5px solid transparent; cursor:pointer;
  transition:transform .15s, border-color .15s, box-shadow .15s;
  padding:0; touch-action:manipulation; outline:none; flex:none;
}
.draw-color-btn.active {
  border-color:#c9b8ff; transform:scale(1.22);
  box-shadow:0 0 8px rgba(124,92,191,0.55);
}
.draw-toolbar {
  display:flex; gap:6px; margin-top:8px;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  padding-bottom:2px; scrollbar-width:none;
}
.draw-toolbar::-webkit-scrollbar { display:none; }
.draw-act-btn {
  padding:8px 12px; background:#1e1a30; border:1px solid #3a3650;
  border-radius:8px; color:#9a88cc; font-size:13px; cursor:pointer;
  touch-action:manipulation; min-height:38px; white-space:nowrap;
  flex:none; transition:all .15s;
}
.draw-act-btn:hover, .draw-act-btn.active {
  background:#2a2540; color:#c9b8ff; border-color:#7c5cbf;
}
.draw-size-dot { font-size:9px; margin-right:2px; }

/* ── KEY HINT ── */
.key-hint { font-size:11px; color:#3a384a; margin-top:10px; }
@media (pointer: coarse) { .key-hint { display:none; } }

/* ── CONTROLS ── */
.controls {
  display:flex; flex-direction:row; gap:7px;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  margin-top:10px; width:100%; max-width:500px;
  padding-bottom:3px; scrollbar-width:none;
}
.controls::-webkit-scrollbar { display:none; }
.ctrl-btn {
  padding:10px 14px; background:transparent;
  border:1px solid #2e2c3e; border-radius:10px;
  color:#5a5870; font-size:13px; cursor:pointer;
  transition:all .15s; flex:none;
  touch-action:manipulation; min-height:44px; white-space:nowrap;
}
.ctrl-btn:hover  { border-color:#4e4c5e; color:#8a88a0; background:#1a1a24; }
.ctrl-btn.active { border-color:#7c5cbf; color:#c9b8ff; background:#1e1a2e; }

/* ── WORD LIST MODAL ── */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.8); z-index:100;
  overflow-y:auto; padding:0;
}
.modal-overlay.open { display:flex; align-items:flex-end; justify-content:center; }

.modal-box {
  background:#1a1a24; border:1px solid #2e2c3e;
  border-radius:20px 20px 0 0; width:100%; max-width:540px;
  padding-bottom:max(env(safe-area-inset-bottom), 8px);
  max-height:92dvh; overflow:hidden; display:flex; flex-direction:column;
}
.modal-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 16px 14px; border-bottom:1px solid #2e2c3e;
  flex-shrink:0;
}
.modal-header h2 { font-size:16px; color:#c9b8ff; font-weight:600; }
.modal-close {
  background:none; border:none; color:#5a5870;
  font-size:19px; cursor:pointer; flex:none;
  padding:3px 7px; border-radius:7px;
}
.modal-close:hover { color:#e8e6f0; background:#2e2c3e; }

.modal-toolbar {
  display:flex; gap:8px; padding:10px 16px;
  border-bottom:1px solid #2e2c3e; flex-wrap:wrap; flex-shrink:0;
}
.tb-btn {
  padding:10px 14px; background:#2e2c3e; border:none;
  border-radius:7px; color:#9a88cc; font-size:13px; cursor:pointer; flex:none;
  touch-action:manipulation; min-height:40px;
}
.tb-btn:hover { background:#3a3850; }
.tb-btn.danger { color:#f08080; background:#3a1a1a; }
.tb-btn.danger:hover { background:#4a2020; }

.wl-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(130px,1fr));
  gap:7px; padding:12px 16px; max-height:48dvh; overflow-y:auto;
  transition:max-height .3s; -webkit-overflow-scrolling:touch;
}

.wl-card {
  background:#141420; border:2px solid #2e2c3e;
  border-radius:12px; padding:11px 9px 30px;
  cursor:pointer; transition:all .15s;
  text-align:center; user-select:none; position:relative;
}
.wl-card:hover { border-color:#4e4c5e; background:#1a1828; }
.wl-card.selected { border-color:#7c5cbf; background:#1e1a2e; }
.wl-card.stroke-active { border-color:#9a88cc !important; }
.wl-card.again-marked { border-color:#5a2a2a; }
.wl-card.again-marked.selected { border-color:#7c5cbf; }

.wl-hanzi  { font-size:24px; color:#f0eeff; margin-bottom:3px; }
.wl-pinyin { font-size:10px; color:#9a88cc; margin-bottom:2px; }
.wl-english{ font-size:9px; color:#4e4c5e; line-height:1.3; }
.wl-tag    { display:inline-block; font-size:8px; padding:1px 5px; border-radius:4px; margin-top:3px; background:#3a1a1a; color:#f08080; }

.wl-stroke-btn {
  position:absolute; bottom:5px; left:50%; transform:translateX(-50%);
  padding:2px 9px; background:#1e1a30; border:1px solid #3a3650;
  border-radius:6px; color:#6a5a9a; font-size:9px; cursor:pointer;
  white-space:nowrap; flex:none; transition:all .15s;
}
.wl-stroke-btn:hover,.wl-stroke-btn.active { background:#2a2540; color:#c9b8ff; border-color:#7c5cbf; }

/* word list stroke preview */
.wl-stroke-preview { display:none; border-top:1px solid #2e2c3e; background:#0f0f14; padding:14px 16px 12px; flex-shrink:0; }
.wl-stroke-preview.visible { display:block; }
.wsp-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.wsp-hanzi  { font-size:22px; color:#f0eeff; }
.wsp-pinyin { font-size:12px; color:#9a88cc; }
.wsp-english{ font-size:11px; color:#5a5870; flex:1; }
.wsp-close  { background:none; border:none; color:#5a5870; font-size:15px; cursor:pointer; flex:none; padding:2px 6px; border-radius:5px; }
.wsp-close:hover { color:#e8e6f0; background:#2e2c3e; }
.wsp-chars  { display:flex; flex-wrap:wrap; gap:9px; justify-content:center; }
.wsp-char-box { display:flex; flex-direction:column; align-items:center; gap:4px; }
.wsp-char-box svg { border-radius:7px; background:#1a1a24; }
.wsp-char-label { font-size:9px; color:#5a5870; }
.wsp-actions { display:flex; gap:7px; margin-top:10px; justify-content:center; }

.modal-footer {
  padding:14px 16px; border-top:1px solid #2e2c3e;
  display:flex; gap:10px; align-items:center; flex-shrink:0;
}
.sel-count { font-size:12px; color:#5a5870; flex:1; }
#wl-practice-btn {
  background:#7c5cbf; color:#fff; border:none; border-radius:11px;
  padding:14px 22px; font-size:14px; font-weight:600; cursor:pointer; flex:none;
  touch-action:manipulation; min-height:48px;
}
#wl-practice-btn:hover { background:#8d6dd0; }
#wl-practice-btn:disabled { opacity:.3; cursor:default; }

/* ── DONE SCREEN ── */
.done-screen { text-align:center; }
.done-screen .big { font-size:44px; margin-bottom:10px; }
.done-screen h2  { font-size:20px; color:#c9b8ff; margin-bottom:5px; }
.summary { display:flex; gap:12px; justify-content:center; margin:16px 0 18px; }
.stat-box { flex:1; padding:12px 8px; border-radius:11px; font-size:12px; }
.stat-box .num { font-size:28px; font-weight:600; margin-bottom:3px; }
.stat-box.good  { background:#1a3a22; color:#80d080; }
.stat-box.again { background:#3a1a1a; color:#f08080; }
.again-list {
  text-align:left; background:#141420; border:1px solid #2e2c3e;
  border-radius:11px; padding:10px 13px; margin-bottom:14px;
  max-height:150px; overflow-y:auto;
}
.again-list h3 { font-size:10px; color:#5a5870; margin-bottom:7px; letter-spacing:.05em; text-transform:uppercase; }
.again-item { display:flex; align-items:baseline; gap:7px; padding:3px 0; border-bottom:1px solid #1e1c2e; }
.again-item:last-child { border-bottom:none; }
.again-item .ah { font-size:18px; color:#f0eeff; min-width:40px; }
.again-item .ap { font-size:12px; color:#9a88cc; }
.again-item .ae { font-size:10px; color:#5a5870; }
.done-btns { display:flex; gap:10px; }
.done-btn { flex:1; padding:14px; border-radius:11px; border:none; font-size:14px; font-weight:500; cursor:pointer; touch-action:manipulation; min-height:50px; }
.done-btn.primary   { background:#7c5cbf; color:#fff; }
.done-btn.primary:hover   { background:#8d6dd0; }
.done-btn.secondary { background:#2e2c3e; color:#c9b8ff; }
.done-btn.secondary:hover { background:#3a3850; }

/* ── IOS INSTALL HINT ── */
.ios-hint {
  position:fixed; left:16px; right:16px;
  bottom:max(calc(env(safe-area-inset-bottom) + 14px), 22px);
  background:linear-gradient(135deg,#241c3a,#1a1630);
  border:1px solid #4e3a7a; border-radius:18px;
  padding:14px 14px 14px 16px;
  display:flex; align-items:center; gap:12px;
  z-index:500;
  box-shadow:0 8px 40px rgba(0,0,0,.65), 0 0 0 1px rgba(124,92,191,.25);
  animation:hint-up .45s cubic-bezier(.34,1.56,.64,1) both;
}
.ios-hint::after {
  content:''; position:absolute;
  bottom:-7px; left:50%; transform:translateX(-50%);
  border:7px solid transparent; border-top-color:#4e3a7a;
  border-bottom:0;
}
@keyframes hint-up   { from{transform:translateY(120px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes hint-down { from{transform:translateY(0);opacity:1} to{transform:translateY(120px);opacity:0} }
.ios-hint-icon {
  width:36px; height:36px; border-radius:10px;
  background:rgba(124,92,191,.2); border:1px solid rgba(124,92,191,.3);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.ios-hint-body { flex:1; min-width:0; }
.ios-hint-title { font-size:13px; font-weight:600; color:#c9b8ff; margin-bottom:3px; }
.ios-hint-step  { font-size:12px; color:#7a6aaa; line-height:1.5; }
.ios-hint-step strong { color:#e8e6f0; }
.ios-hint-share {
  display:inline-flex; align-items:center; justify-content:center;
  width:20px; height:20px; background:rgba(124,92,191,.25);
  border:1px solid rgba(124,92,191,.4); border-radius:5px;
  vertical-align:middle; margin:0 1px;
}
.ios-hint-close {
  background:rgba(255,255,255,.06); border:1px solid #3a3650;
  border-radius:9px; color:#7a6aaa; font-size:13px;
  width:30px; height:30px; padding:0; display:flex;
  align-items:center; justify-content:center; flex-shrink:0;
  touch-action:manipulation; cursor:pointer; flex:none;
  min-height:unset;
}
.ios-hint-close:hover { color:#e8e6f0; background:rgba(255,255,255,.1); }

/* ── SPEAK BUTTON ── */
.speak-btn {
  background:none; border:none; font-size:22px; cursor:pointer;
  padding:2px 8px; flex:none; min-height:unset;
  opacity:0.45; transition:all .15s; display:block; margin:4px auto 0;
  touch-action:manipulation; border-radius:8px;
}
.speak-btn:hover, .speak-btn:active { opacity:1; background:rgba(124,92,191,.15); }

/* ── REVERSE (HANZI → PINYIN) MODE ── */
.pinyin.hanzi-mode { font-size:54px; letter-spacing:.1em; color:#f0eeff; font-weight:400; }
#reveal-answer { text-align:center; }
.rev-pinyin  { font-size:26px; color:#c9b8ff; font-weight:300; margin-bottom:4px; }
.rev-pos     { font-size:12px; color:#5a5870; margin-bottom:6px; }
.rev-english { font-size:15px; color:#8a889e; }

/* ── WORD LIST STROKE BTN FIX ── */
.wl-card { padding:10px 8px 10px !important; }
.wl-stroke-btn {
  position:static !important; transform:none !important;
  left:auto !important; bottom:auto !important;
  display:block; margin:6px auto 0;
  padding:4px 10px; font-size:11px;
}

/* ── TYPING MODE ── */
.type-input-wrap { margin-bottom:14px; }
.type-input {
  width:100%; padding:14px 16px;
  background:#141420; border:2px solid #3a3650;
  border-radius:14px; color:#f0eeff;
  font-size:22px; font-family:inherit;
  outline:none; transition:border-color .2s;
  text-align:center;
}
.type-input:focus { border-color:#7c5cbf; }
.type-input::placeholder { color:#3a384a; font-size:14px; letter-spacing:0; }
.type-input:disabled { opacity:.5; }
.type-result {
  margin-bottom:10px; padding:10px 14px;
  border-radius:10px; font-size:13px; font-weight:500;
  display:none; text-align:center; line-height:1.6;
}
.type-result.visible { display:block; }
.type-result.correct { background:#1a3a22; color:#80d080; }
.type-result.wrong   { background:#3a1a1a; color:#f08080; }
.type-result .tr-answer { font-size:20px; color:#f0eeff; display:block; margin-top:4px; }

/* ── STATS MODAL ── */
.stats-total { text-align:center; padding:14px 16px 6px; font-size:12px; color:#5a5870; }
.stats-total strong { font-size:20px; color:#c9b8ff; font-weight:600; }
.stats-num-row { display:flex; gap:8px; padding:8px 16px 14px; }
.stats-num-box { flex:1; padding:10px 6px; border-radius:10px; text-align:center; }
.stats-num-box .sn-num { font-size:24px; font-weight:600; }
.stats-num-box .sn-lbl { font-size:9px; opacity:.75; text-transform:uppercase; letter-spacing:.06em; }
.sn-mastered { background:#221a33; color:#c9b8ff; }
.sn-review   { background:#1a2a1a; color:#4aad7a; }
.sn-learning { background:#2a1f10; color:#d4943a; }
.sn-new      { background:#152030; color:#4a9fe0; }
.stats-ch-list { padding:0 16px 14px; }
.stats-ch-item { margin-bottom:12px; }
.stats-ch-label { display:flex; justify-content:space-between; margin-bottom:5px; font-size:12px; color:#8a889e; }
.stats-ch-pct   { font-size:11px; color:#7a6aaa; }
.stats-ch-bar   { height:8px; background:#2e2c3e; border-radius:4px; overflow:hidden; display:flex; }
.stats-bar-seg-m { height:100%; background:#7c5cbf; }
.stats-bar-seg-r { height:100%; background:#4aad7a; }
.stats-bar-seg-l { height:100%; background:#d4943a; }

/* ── ALL-CHAPTERS word list ── */
.wl-ch-tag {
  display:inline-block; font-size:8px; padding:1px 5px; border-radius:4px;
  background:#1e1c2e; color:#6a5a9a; margin-bottom:3px; font-weight:600;
}
.wl-modal-tabs { display:flex; gap:6px; padding:8px 16px 2px; flex-shrink:0; }
.wl-tab-btn {
  padding:6px 14px; background:#2e2c3e; border:none;
  border-radius:7px; color:#7a6aaa; font-size:12px; cursor:pointer; flex:none;
  touch-action:manipulation; min-height:34px; transition:all .15s;
}
.wl-tab-btn.active { background:#7c5cbf; color:#fff; }
.wl-tab-btn:hover:not(.active) { background:#3a3850; }

/* ── LESSON MODAL ── */
.lesson-box { max-height:92dvh; }
.lesson-tabs { display:flex; gap:6px; padding:8px 16px 0; flex-shrink:0; flex-wrap:wrap; }
.lesson-tab-btn {
  padding:6px 16px; background:#2e2c3e; border:none;
  border-radius:7px; color:#7a6aaa; font-size:12px; cursor:pointer;
  touch-action:manipulation; min-height:34px; transition:all .15s;
}
.lesson-tab-btn.active { background:#7c5cbf; color:#fff; }
.lesson-tab-btn:hover:not(.active) { background:#3a3850; }
.lesson-content { overflow-y:auto; max-height:72dvh; padding:16px; }

/* Texts tab */
.text-block { margin-bottom:24px; }
.text-block-title { font-size:17px; font-weight:600; color:#c9b8ff; margin-bottom:2px; }
.text-block-sub { font-size:11px; color:#7a6aaa; margin-bottom:12px; }
.text-para-zh { font-size:16px; line-height:1.9; color:#e8e6f0; margin-bottom:4px; }
.text-para-py { font-size:12px; line-height:1.7; color:#7c5cbf; margin-bottom:5px; font-style:italic; }
.text-para-en { font-size:12px; line-height:1.6; color:#7a7888; margin-bottom:16px; border-left:2px solid #2e2c3e; padding-left:10px; }
.text-source { font-size:11px; color:#5a5870; margin-top:2px; }

/* Grammar tab */
.grammar-item { border:1px solid #2e2c3e; border-radius:10px; margin-bottom:10px; overflow:hidden; }
.grammar-header { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; cursor:pointer; background:#141420; user-select:none; touch-action:manipulation; }
.grammar-title-zh { font-size:15px; color:#c9b8ff; font-weight:600; }
.grammar-title-py { font-size:12px; color:#7c5cbf; margin-left:8px; }
.grammar-title-en { font-size:11px; color:#7a7888; margin-top:3px; }
.grammar-chevron { color:#5a5870; font-size:14px; transition:transform .2s; flex-shrink:0; margin-left:8px; }
.grammar-header.gopen .grammar-chevron { transform:rotate(180deg); }
.grammar-body { padding:12px 14px; background:#0d0d16; border-top:1px solid #2e2c3e; display:none; }
.grammar-body.gopen { display:block; }
.grammar-rule { font-size:13px; color:#a0a0b8; margin-bottom:10px; line-height:1.7; }
.grammar-rule strong { color:#e8e6f0; }
.grammar-example { background:#141420; border-radius:8px; padding:8px 12px; margin-bottom:6px; }
.grammar-ex-zh { font-size:15px; color:#e8e6f0; margin-bottom:2px; line-height:1.6; }
.grammar-ex-py { font-size:11px; color:#7c5cbf; margin-bottom:1px; }
.grammar-ex-en { font-size:11px; color:#7a7888; }
.grammar-note { background:#1e1a2e; border-radius:6px; padding:8px 10px; margin:8px 0; font-size:12px; color:#c9b8ff; border-left:3px solid #7c5cbf; }

/* Exercises tab */
.ex-section { margin-bottom:24px; }
.ex-section-title { font-size:13px; font-weight:600; color:#9a88cc; margin-bottom:10px; }
.ex-hint { font-size:11px; color:#7c5cbf; margin-bottom:10px; background:#1e1a2e; padding:6px 10px; border-radius:6px; }
.ex-item { margin-bottom:14px; }
.ex-item-q { font-size:14px; color:#e8e6f0; line-height:1.7; }
.mc-options { display:flex; flex-direction:column; gap:6px; margin-top:7px; }
.mc-opt { padding:9px 12px; background:#141420; border:1px solid #2e2c3e; border-radius:8px; cursor:pointer; font-size:13px; color:#9a88cc; touch-action:manipulation; transition:all .15s; }
.mc-opt:hover:not(.correct):not(.wrong) { border-color:#4e4c5e; color:#c9b8ff; }
.mc-opt.correct { background:#1a3a22; border-color:#4aad7a; color:#80d080; pointer-events:none; }
.mc-opt.wrong   { background:#3a1a1a; border-color:#e05555; color:#f08080; }
.fill-wrap { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:4px; }
.fill-blank-input { background:#141420; border:1px solid #2e2c3e; border-radius:6px; color:#e8e6f0; font-size:15px; padding:5px 10px; width:90px; text-align:center; outline:none; font-family:inherit; transition:border-color .15s; }
.fill-blank-input:focus { border-color:#7c5cbf; }
.fill-blank-input.correct { border-color:#4aad7a; background:#1a3a22; color:#80d080; }
.fill-blank-input.wrong   { border-color:#e05555; background:#3a1a1a; color:#f08080; }
.fill-check-btn { padding:6px 14px; background:#2e2c3e; border:none; border-radius:7px; color:#c9b8ff; font-size:13px; cursor:pointer; touch-action:manipulation; }
.fill-check-btn:hover { background:#3a3850; }

/* ── EXAMPLE PREVIEW (shown on card reveal) ── */
.card-ex-preview {
  margin-top:8px; padding:10px 14px;
  background:#0f0f1a; border:1px solid #2a2840; border-radius:10px;
  display:none;
}
.card-ex-preview.show { display:block; }
.cep-label { font-size:9px; color:#5a5870; text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; }
.cep-zh { font-size:15px; color:#d0ceec; line-height:1.6; }
.cep-en { font-size:11px; color:#6a6880; margin-top:3px; }

/* ── SWIPE HINT ── */
.swipe-hint {
  font-size:10px; color:#3a3850; text-align:center; margin-top:6px;
  letter-spacing:.04em; transition:opacity .3s;
}

/* ── VOCAB HIGHLIGHT in lesson text ── */
.vocab-hl {
  color:#c9b8ff; border-bottom:1px dotted #7c5cbf;
  cursor:pointer; touch-action:manipulation;
  transition:background .15s; border-radius:2px; padding:0 1px;
}
.vocab-hl:hover, .vocab-hl:active { background:#2a1f44; }

/* ── STREAK ── */
.streak-badge {
  display:inline-flex; align-items:center; gap:4px;
  font-size:12px; font-weight:600; color:#f0a040;
  background:#2a1a08; border:1px solid #4a3010;
  border-radius:20px; padding:3px 10px;
  margin-bottom:6px; cursor:default;
}
.streak-badge.dead { color:#5a5870; background:#1a1a20; border-color:#2e2c3e; }

/* ── SEARCH MODAL ── */
#search-modal .modal-box { border-radius:20px; max-height:85dvh; }
.search-input-wrap { padding:12px 16px; border-bottom:1px solid #2e2c3e; flex-shrink:0; }
#search-input {
  width:100%; padding:12px 14px;
  background:#0f0f14; border:1px solid #3a3650;
  border-radius:12px; color:#e8e6f0; font-size:16px;
  outline:none; font-family:inherit;
}
#search-input:focus { border-color:#7c5cbf; }
#search-input::placeholder { color:#3a384a; }
.search-results { overflow-y:auto; max-height:60dvh; padding:8px 0; }
.search-result-item {
  display:flex; align-items:center; gap:10px;
  padding:11px 16px; cursor:pointer; transition:background .12s;
}
.search-result-item:hover { background:#1a1828; }
.sr-hanzi  { font-size:22px; color:#f0eeff; min-width:46px; }
.sr-py     { font-size:12px; color:#7c5cbf; }
.sr-en     { font-size:12px; color:#5a5870; flex:1; }
.sr-ch     { font-size:10px; color:#3a384a; background:#1e1c2e; padding:2px 6px; border-radius:4px; flex-none; }
.search-empty { text-align:center; padding:24px 16px; font-size:13px; color:#4e4c5e; }

/* ── CONFETTI ── */
#confetti-canvas {
  position:fixed; inset:0; pointer-events:none; z-index:9998;
  width:100%; height:100%;
}

/* ── EXPORT/IMPORT ── */
.backup-row { display:flex; gap:8px; padding:0 16px 14px; }
.backup-btn {
  flex:1; padding:10px 14px; background:#2e2c3e; border:none;
  border-radius:8px; color:#c9b8ff; font-size:13px; cursor:pointer;
  touch-action:manipulation; min-height:40px; transition:all .15s;
}
.backup-btn:hover { background:#3a3850; }
.backup-btn.danger { color:#f08080; background:#3a1a1a; }
.backup-btn.danger:hover { background:#4a2020; }

/* ── LESSON PINYIN TOGGLE ── */
.lesson-modal-toolbar {
  display:flex; gap:6px; padding:4px 16px 8px; flex-shrink:0;
}
.lmt-btn {
  padding:5px 12px; background:#2e2c3e; border:none;
  border-radius:7px; color:#7a6aaa; font-size:12px; cursor:pointer;
  touch-action:manipulation; transition:all .15s;
}
.lmt-btn:hover { background:#3a3850; color:#c9b8ff; }
.lmt-btn.active { background:#1e1a2e; border:1px solid #7c5cbf; color:#c9b8ff; }
.hide-py .text-para-py { display:none !important; }

/* ── VOCAB POPUP ── */
.vocab-popup {
  position:fixed; z-index:9999;
  background:#1e1c30; border:1px solid #4a3880;
  border-radius:12px; padding:12px 16px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  min-width:180px; max-width:260px;
  display:none; pointer-events:auto;
}
.vocab-popup.show { display:block; }
.vp-hanzi { font-size:26px; color:#e8e6f0; font-weight:500; }
.vp-pinyin { font-size:13px; color:#7c5cbf; margin:2px 0; }
.vp-pos { font-size:10px; color:#5a5870; text-transform:uppercase; letter-spacing:.06em; }
.vp-en  { font-size:13px; color:#a8a6c0; margin-top:4px; }
.vp-close { position:absolute; top:8px; right:10px; background:none; border:none; color:#5a5870; font-size:16px; cursor:pointer; line-height:1; padding:0; }
</style>
</head>
<body>

<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px;margin-top:8px;">
  <h1 id="page-title" style="margin:0">Chinese Practice</h1>
  <div id="streak-badge" class="streak-badge" title="Study streak"></div>
</div>

<div class="chapter-switcher">
  <button class="ch-btn" id="ch-btn-1" onclick="switchChapter(1)">
    <span class="ch-num">Ch 1</span>
    <span class="ch-name">上海的地铁</span>
  </button>
  <button class="ch-btn active" id="ch-btn-2" onclick="switchChapter(2)">
    <span class="ch-num">Ch 2</span>
    <span class="ch-name">为什么不快乐</span>
  </button>
  <button class="ch-btn" id="ch-btn-3" onclick="switchChapter(3)">
    <span class="ch-num">Ch 3</span>
    <span class="ch-name">塞翁失马</span>
  </button>
  <button class="ch-btn" id="ch-btn-4" onclick="switchChapter(4)">
    <span class="ch-num">Ch 4</span>
    <span class="ch-name">狼和鹿</span>
  </button>
  <button class="ch-btn" id="ch-btn-5" onclick="switchChapter(5)">
    <span class="ch-num">Ch 5</span>
    <span class="ch-name">丽江的画</span>
  </button>
  <button class="ch-btn" id="ch-btn-6" onclick="switchChapter(6)">
    <span class="ch-num">Ch 6</span>
    <span class="ch-name">终于结婚了</span>
  </button>
</div>

<div id="srs-stats" class="srs-stats"></div>

<div class="card" id="main-card">
  <div class="progress">
    <span id="prog-text">1 / 38</span>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="pinyin"  id="pinyin"></div>
  <button class="speak-btn" id="speak-btn" onclick="speakCurrent()" title="Hear pronunciation">🔊</button>
  <div class="pos"     id="pos"></div>
  <div class="english" id="english"></div>

  <button class="draw-toggle-btn" id="draw-toggle-btn" onclick="toggleDraw()">✏️ Draw</button>
  <div class="draw-wrap" id="draw-wrap" style="display:none">
    <canvas id="draw-canvas"></canvas>
    <div class="draw-colors">
      <button class="draw-color-btn active" id="dc-0" onclick="setDrawColor(0)" style="background:#f0eeff" title="Default"></button>
      <button class="draw-color-btn" id="dc-1" onclick="setDrawColor(1)" style="background:#ff6b6b" title="Red"></button>
      <button class="draw-color-btn" id="dc-2" onclick="setDrawColor(2)" style="background:#74b9ff" title="Blue"></button>
      <button class="draw-color-btn" id="dc-3" onclick="setDrawColor(3)" style="background:#55efc4" title="Green"></button>
      <button class="draw-color-btn" id="dc-4" onclick="setDrawColor(4)" style="background:#ffd93d" title="Yellow"></button>
      <button class="draw-color-btn" id="dc-5" onclick="setDrawColor(5)" style="background:#fd79a8" title="Pink"></button>
      <button class="draw-action-btn" onclick="drawUndo()">↩ Undo</button>
      <button class="draw-action-btn" onclick="drawClear()">✕ Clear</button>
    </div>
    <div class="draw-toolbar">
      <button class="draw-act-btn draw-size-btn" id="dsz-s" onclick="setDrawSize(2,'s')"><span class="draw-size-dot">●</span>S</button>
      <button class="draw-act-btn draw-size-btn active" id="dsz-m" onclick="setDrawSize(4,'m')"><span class="draw-size-dot">●</span>M</button>
      <button class="draw-act-btn draw-size-btn" id="dsz-l" onclick="setDrawSize(7,'l')"><span class="draw-size-dot">●</span>L</button>
      <button class="draw-act-btn" id="draw-erase-btn" onclick="toggleEraser()">◯ Eraser</button>
      <button class="draw-act-btn" id="draw-ref-btn" onclick="toggleDrawRef()">◻ Trace</button>
      <button class="draw-act-btn" id="draw-grid-btn" onclick="cycleDrawGrid()">田 Grid</button>
      <button class="draw-act-btn" id="draw-theme-btn" onclick="toggleDrawTheme()">◑ Dark</button>
      <button class="draw-act-btn" id="draw-lock-btn" onclick="toggleDrawLock()">🔒 Lock</button>
    </div>
  </div>

  <div class="answer-area" id="answer-area" onclick="reveal()">
    <span class="answer-hint" id="answer-hint">Tap to reveal</span>
    <span class="hanzi" id="hanzi" style="display:none"></span>
    <div id="reveal-answer" style="display:none"></div>
  </div>

  <div class="btn-row">
    <button id="btn-reveal" onclick="reveal()">Reveal Answer</button>
  </div>

  <div class="rating-row" id="rating-row">
    <button id="btn-again" onclick="rate('again')">↩ Practice Again</button>
    <button id="btn-good"  onclick="rate('good')">✓ Got It</button>
  </div>

  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn" data-tab="strokes"   onclick="switchTab('strokes')">✏️ Strokes</button>
    <button class="tab-btn" data-tab="examples"  onclick="switchTab('examples')">📖 Examples</button>
    <button class="tab-btn" data-tab="practice"  onclick="switchTab('practice')">✍️ Practice</button>
  </div>

  <div id="card-ex-preview" class="card-ex-preview">
    <div class="cep-label">Example</div>
    <div class="cep-zh" id="cep-zh"></div>
    <div class="cep-en" id="cep-en"></div>
  </div>

  <div class="tab-content" id="tab-content"></div>

  <div class="key-hint" id="key-hint"></div>
  <div class="swipe-hint" id="swipe-hint"></div>
</div>

<div class="controls">
  <button class="ctrl-btn" id="btn-shuffle"    onclick="toggleShuffle()">⇄ Shuffle</button>
  <button class="ctrl-btn" id="btn-hint"       onclick="toggleHint()">💡 Hide English</button>
  <button class="ctrl-btn"                     onclick="openWordList()">☰ Word List</button>
  <button class="ctrl-btn"                     onclick="startDueReview()">📅 Due Review</button>
  <button class="ctrl-btn"                     onclick="location.reload()">↺ Restart All</button>
  <button class="ctrl-btn" id="btn-mode"       onclick="toggleMode()">🔄 Reverse</button>
  <button class="ctrl-btn" id="btn-type"       onclick="toggleTypingMode()">✍️ Type</button>
  <button class="ctrl-btn"                     onclick="openSearch()">🔍 Search</button>
  <button class="ctrl-btn"                     onclick="openStats()">📊 Stats</button>
  <button class="ctrl-btn"                     onclick="openLesson()">📖 Lesson</button>
</div>

<!-- WORD LIST MODAL -->
<div class="modal-overlay" id="wl-modal">
  <div class="modal-box">
    <div style="display:flex;justify-content:center;padding:10px 0 2px;"><div style="width:36px;height:4px;background:#3a3850;border-radius:2px;"></div></div>
    <div class="modal-header">
      <h2>Word List</h2>
      <button class="modal-close" onclick="closeWordList()">✕</button>
    </div>
    <div class="wl-modal-tabs">
      <button class="wl-tab-btn active" id="wl-tab-current" onclick="wlSwitchTab('current')">Current Chapter</button>
      <button class="wl-tab-btn" id="wl-tab-all" onclick="wlSwitchTab('all')">All Chapters</button>
    </div>
    <div class="modal-toolbar" id="wl-toolbar">
      <button class="tb-btn" onclick="wlSelectAll()">Select All</button>
      <button class="tb-btn" onclick="wlSelectAgain()">Again Words</button>
      <button class="tb-btn danger" onclick="wlClear()">Clear</button>
    </div>
    <div class="wl-grid" id="wl-grid"></div>
    <div class="wl-stroke-preview" id="wl-stroke-preview">
      <div class="wsp-header">
        <span class="wsp-hanzi"  id="wsp-hanzi"></span>

            zh:'20世纪初，在北美洲的一片丛林里，到处可以看到一群群可爱的鹿。鹿群之中，还有天敌——狼群。当地政府担心狼会伤害鹿，于是派猎人大量猎杀了那里的狼。结果，鹿的数量迅速增多。大概过了二十几年，那里的鹿从不到四万只增加到了十几万只。',
            py:'Èrshí shìjì chū, zài Běi Měizhōu de yī piàn cónglín lǐ, dàochù kěyǐ kàndào yī qún qún kě\'ài de lù. Lù qún zhī zhōng, hái yǒu tiāndí — láng qún. Dāngdì zhèngfǔ dānxīn láng huì shānghài lù, yúshì pài lièrén dàliàng lièshā le nàlǐ de láng. Jiéguǒ, lù de shùliàng xùnsù zēngduō. Dàgài guò le èrshí jǐ nián, nàlǐ de lù cóng bú dào sì wàn zhī zēngjiā dào le shí jǐ wàn zhī.',
            en:'In the early 20th century, in a forest in North America, you could see herds of lovely deer everywhere. Among the deer lived their natural enemy — wolves. The local government, worried that wolves would harm the deer, sent hunters to kill large numbers of wolves. As a result, the deer population grew rapidly. After about twenty years, the deer population had grown from fewer than 40,000 to over 100,000.'
          },
          {
            zh:'由于鹿的数量太多，食物不够吃，很多鹿饿死了。不久，鹿的数量又从十几万只减少到了不到八千只。人们这时才觉得后悔：森林里也发生了很大变化，树木一棵一棵地消失了。我们不能破坏大自然的平衡。',
            py:'Yóuyú lù de shùliàng tài duō, shíwù bú gòu chī, hěn duō lù è sǐ le. Bùjiǔ, lù de shùliàng yòu cóng shí jǐ wàn zhī jiǎnshǎo dào le bú dào bā qiān zhī. Rénmen zhè shí cái juéde hòuhuǐ: sēnlín lǐ yě fāshēng le hěn dà biànhuà, shùmù yī kē yī kē de xiāoshī le. Wǒmen bù néng pòhuài dàzìrán de pínghéng.',
            en:'Because there were too many deer and not enough food, many starved to death. Before long, the deer population dropped back from over 100,000 to fewer than 8,000. Only then did people feel regret: the forest had also changed greatly, with trees disappearing one by one. We must not destroy the balance of nature.'
          }
        ]

      {
        num:'§2', title:'韩国人的环保意识', en:'Koreans\' Environmental Awareness',
        paragraphs:[
          {
            zh:'去年夏天，韩国留学生帮我们搬了一些行李，上面带着一些细细的行李标签。第二天上午，我们在一家朝鲜族饭馆吃饭，他突然指着饭馆里最好的座位说："可以先过来吃，工作找到以后，再来这里请你吃好的。"说完，大家开心地吃起来，那顿饭感觉特别好吃。',
            py:'Qùnián xiàtiān, Hánguó liúxuéshēng bāng wǒmen bān le yīxiē xíngli. Dì èr tiān shàngwǔ, wǒmen zài yī jiā cháoxiǎnzú fànguǎn chīfàn, tā tūrán zhǐ zhe fànguǎn lǐ zuì hǎo de zuòwèi shuō: "Kěyǐ xiān guò lái chī, gōngzuò zhǎodào yǐhòu, zài lái zhèlǐ qǐng nǐ chī hǎo de." Shuō wán, dàjiā kāixīn de chī qǐlái, nà dùn fàn gǎnjué tèbié hǎochī.',
            en:'Last summer, a Korean exchange student helped us move some luggage. The next morning, while eating at a Korean restaurant, he suddenly pointed to the best table and said: "Let\'s eat here first. Once I find a job, I\'ll treat you to a proper meal here." After saying this, everyone ate happily, and that meal felt especially delicious.'
          },
          {
            zh:'回到了冷冷的长椅上，这梦是可以做的。我想起回到这里梦绕的眼眸。我的好奇有着有趣的感觉，不知不觉快乐。也许，我们好运气，别人的善意就藏在我们身边的某个地方，比如说，藏在一个苹果里——苹果从树上掉了下来，牛顿从苹果里找到了他的好运。',
            py:'Huí dào lěng lěng de cháng yǐ shàng, zhè mèng shì kěyǐ zuò de. Wǒ xiǎngqǐ huí dào zhèlǐ mèng rào de yǎn móu. Yěxǔ, wǒmen de hǎo yùnqì, biéren de shànyì jiù cáng zài wǒmen shēnbiān de mǒu gè dìfāng, bǐrú shuō, cáng zài yī gè píngguǒ lǐ — píngguǒ cóng shù shàng diào le xià lái, Niúdùn cóng píngguǒ lǐ zhǎodào le tā de hǎo yùn.',
            en:'Sitting back on the cold bench, this dream is possible. Perhaps our good fortune and others\' kindness are hidden somewhere nearby — for example, hidden inside an apple. An apple fell from a tree, and Newton found his good fortune in that apple.'
          }
        ]

  5: {
    texts:[
      {
        num:'§1', title:'住在一幅叫"丽江"的画里', en:'Living in a Picture Called "Lijiang"',
        paragraphs:[
          {
            zh:'丽江是一座没有城墙的城。我们住在老城里的一家小客店，院子里鲜花开满了，小鸟在树上唱歌。客店里，女主人亲切地给我们倒茶。清晨一大早，走在青石板路上，你会碰到这里的主人：上学的孩子，喝茶的老人，买菜的大妈。他们轻声细语，从你身旁走过。沿小路散步，山是那么的蓝，天是那么的蓝。',
            py:'Lìjiāng shì yī zuò méiyǒu chéngqiáng de chéng. Wǒmen zhù zài lǎochéng lǐ de yī jiā xiǎo kèdiàn, yuànzi lǐ xiānhuā kāi mǎn le, xiǎo niǎo zài shù shàng chànggē. Kèdiàn lǐ, nǚ zhǔrén qīnqiè de gěi wǒmen dào chá. Qīngchén yīdàzǎo, zǒu zài qīng shí bǎn lù shàng, nǐ huì pèng dào zhèlǐ de zhǔrén: shàng xué de háizi, hē chá de lǎorén, mǎi cài de dàmā. Tāmen qīng shēng xì yǔ, cóng nǐ shēn páng zǒuguò. Yán xiǎolù sànbù, shān shì nàme de lán, tiān shì nàme de lán.',
            en:'Lijiang is a city without walls. We stayed in a small inn in the old town, where the courtyard was full of flowers and birds sang in the trees. Inside the inn, the innkeeper kindly poured tea for us. Early in the morning, walking on the blue stone slab streets, you would meet the locals: children going to school, elderly people drinking tea, elderly ladies doing the morning shopping. They passed by your side speaking in soft, gentle voices. Strolling along the path, the mountains were so blue, the sky was so blue.'
          },
          {
            zh:'街上渐渐热闹起来，古城在人们的轻声细语中渐渐地活过来了。你慢慢走着，看见穿着五颜六色衣服的游客向你涌过来，空气中是花草和咖啡的味道。走着走着，一会儿到了中午。你随便走进一个溜边的小酒吧，坐下来，来上一杯酒，再来一份丽江的小吃，你打开眼睛，丽江真的变成了一幅画，时间好像停住了，你闭上眼睛，什么都忘不起来了。',
            py:'Jiē shàng jiànjiàn rènào qǐlái, gǔchéng zài rénmen de qīng shēng xì yǔ zhōng jiànjiàn de huó guòlái le. Nǐ mànmàn zǒu zhe, kànjiàn chuān zhe wǔ yán liù sè yīfu de yóukè xiàng nǐ yǒng guòlái, kōngqì zhōng shì huācǎo hé kāfēi de wèidào. Zǒu zhe zǒu zhe, yīhuìr dào le zhōngwǔ. Nǐ suíbiàn zǒu jìn yī gè xiǎo jiǔbā, zuò xiàlái, lái shàng yī bēi jiǔ, zài lái yī fèn Lìjiāng de xiǎochī, nǐ dǎkāi yǎnjīng, Lìjiāng zhēn de biàn chéng le yī fú huà, shíjiān hǎoxiàng tíng zhù le, nǐ bì shàng yǎnjīng, shénme dōu wàng bù qǐlái le.',
            en:'The streets gradually became lively; the old town slowly came alive in the soft murmur of people\'s voices. You walked slowly, watching tourists in colorful clothing flowing toward you, the air filled with the scent of flowers and coffee. Walking and walking, it was suddenly noon. You casually walked into a small bar by the side, sat down, ordered a glass of wine and some Lijiang snacks. You opened your eyes — Lijiang had truly become a painting. Time seemed to stop. You closed your eyes and forgot everything.'
          },
          {
            zh:'天接渐渐黑下来了，红红黄黄的灯光亮起来了。你来到老城的中心，听纳西古乐，看东巴乐舞。你想把这些拍下来，旁边有人拉住了你的手，于是，你跟着他们一起跳起来了……丽江是一幅画，一不小心，你也成了画里的一片风景……',
            py:'Tiān jiànjiàn hēi xiàlái le, hóng hóng huáng huáng de dēngguāng liàng qǐlái le. Nǐ lái dào lǎochéng de zhōngxīn, tīng Nàxī gǔ yuè, kàn Dōngbā yuè wǔ. Nǐ xiǎng bǎ zhèxiē pāi xiàlái, pángbiān yǒu rén lā zhù le nǐ de shǒu, yúshì, nǐ gēn zhe tāmen yīqǐ tiào qǐlái le… Lìjiāng shì yī fú huà, yī bù xiǎoxīn, nǐ yě chéng le huà lǐ de yī piàn fēngjǐng…',
            en:'The sky gradually darkened, and the red and yellow lantern lights lit up. You came to the heart of the old town, listening to Naxi ancient music and watching Dongba music and dance. You wanted to take photos, but someone nearby grabbed your hand, and so you started dancing with them… Lijiang is a painting — and without noticing, you have become part of the scenery inside it…',
          },
        ],
        source:'(根据《懒懒网》游记改写)'
      },
      {

        paragraphs:[
          {
            zh:'走进北京城，人们感兴趣的往往不是高楼大厦，而是那些小小的胡同。要知道老北京的味道，就先去胡同。最古老的胡同已经有900多年的历史了。',
            py:'Zǒu jìn Běijīng chéng, rénmen gǎn xìngqù de wǎngwǎng bú shì gāo lóu dà shà, ér shì nàxiē xiǎo xiǎo de hútòng. Yào zhīdào lǎo Běijīng de wèidào, jiù xiān qù hútòng. Zuì gǔlǎo de hútòng yǐjīng yǒu 900 duō nián de lìshǐ le.',
            en:'When people enter Beijing, what interests them is often not the tall buildings, but the small hutongs (alleys). To know the taste of old Beijing, go to the hutongs first. The most ancient hutongs already have a history of over 900 years.'
          },
          {
            zh:'北京的胡同大多是横平竖直的，也有一些胡同是弯弯曲曲的。有的又长又细，最细的是"一尺大街"，全长才十米左右。有的胡同很窄，比如前门的钱市胡同，最窄的地方只有40厘米，两个人在胡同里遇上了，必须侧着身子才能过去。',
            py:'Běijīng de hútòng dàduō shì héng píng shù zhí de, yě yǒu yīxiē hútòng shì wānwān qūqū de. Yǒu de yòu cháng yòu xì, zuì xì de shì "Yīchǐ Dàjiē", quán cháng cái shí mǐ zuǒyòu. Yǒu de hútòng hěn zhǎi, bǐrú Qiánmén de Qiánshì Hútòng, zuì zhǎi de dìfāng zhǐ yǒu 40 límǐ, liǎng gè rén zài hútòng lǐ pèng shàng le, bìxū cè zhe shēnzi cái néng guòqù.',
            en:'Most of Beijing\'s hutongs run in straight horizontal and vertical lines, though some are winding and curved. Some are long and narrow — the narrowest is "Yichi Street," which is only about 10 meters long in total. Some hutongs are very tight: Qianshi Hutong near Qianmen is only 40 cm wide at its narrowest point. If two people meet there, they must turn sideways to pass.'
          },
          {
            zh:'千百条胡同一起组成了美丽的北京城。近年来，"胡同游"吸引了越来越多的游客，骑上三轮车，在胡同里走一走，跟当地人聊一聊，你会觉得：北京真美，最美在胡同！',
            py:'Qiānbǎi tiáo hútòng yīqǐ zǔchéng le měilì de Běijīng chéng. Jìn nián lái, "hútòng yóu" xīyǐn le yuèlái yuè duō de yóukè, qí shàng sānlúnchē, zài hútòng lǐ zǒu yī zǒu, gēn dāngdì rén liáo yī liáo, nǐ huì juéde: Běijīng zhēn měi, zuì měi zài hútòng!',
            en:'Hundreds of hutongs together form the beautiful city of Beijing. In recent years, "hutong tours" have attracted more and more tourists. Ride a rickshaw, walk through the hutongs, chat with the locals — and you\'ll feel: Beijing is truly beautiful, and the most beautiful part is its hutongs!'
          }
        ]
      }
    ],
    grammar:[
      {

        rule:'Besides physical upward movement, <strong>上</strong> has three extended meanings:\n① <strong>Contact / fixing</strong>: the action attaches or connects something.\n② <strong>Reaching a goal</strong>: achieving what was aimed at.\n③ <strong>Exceeding a number</strong>: surpassing a quantity.',
        note:'',

/* ─────────────────── TONE COLORS ─────────────────── */
const TONE_CLR = ['#888','#e05555','#d4943a','#4aad7a','#4a9fe0'];
function toneOf(syl) {
  if (/[āēīōūǖ]/.test(syl)) return 1;
  if (/[áéíóúǘ]/.test(syl)) return 2;
  if (/[ǎěǐǒǔǚ]/.test(syl)) return 3;
  if (/[àèìòùǜ]/.test(syl)) return 4;
  return 0;
}
function colorPinyin(text) {
  return text.split(/\s+/).filter(Boolean).map(syl =>
    `<span style="color:${TONE_CLR[toneOf(syl)]}">${syl}</span>`
  ).join(' ');
}

/* ─────────────────── SRS ─────────────────── */
const DAY = 86400000;
function srsKey(wi) { return `srs_ch${currentChapter}_${wi}`; }
function getSRS(wi) {
  const s = localStorage.getItem(srsKey(wi));
  return s ? JSON.parse(s) : { interval:0, ease:2.5, due:0, reps:0, lapses:0 };
}
function setSRS(wi, good) {
  const s = getSRS(wi), now = Date.now();
  if (good) {
    s.interval = s.reps===0 ? 1 : s.reps===1 ? 6 : Math.round(s.interval * s.ease);
    s.ease = Math.max(1.3, s.ease + 0.1);
    s.reps++;
  } else {
    s.interval = 1; s.ease = Math.max(1.3, s.ease - 0.2);
    s.lapses++; s.reps = 0;
  }
  s.due = now + s.interval * DAY;
  localStorage.setItem(srsKey(wi), JSON.stringify(s));
}
function srsStatus(wi) {
  const s = getSRS(wi);
  if (s.reps === 0) return 'new';
  if (s.interval >= 21) return 'mastered';
  if (s.interval >= 7)  return 'review';
  return 'learning';
}
function updateSrsStats() {
  const el = document.getElementById('srs-stats');
  if (!el) return;
  const now = Date.now(), all = WORDS().map((_,i) => i);
  const due = all.filter(i => { const s=getSRS(i); return s.reps>0 && s.due<=now; });
  const nw  = all.filter(i => getSRS(i).reps===0);
  if (due.length===0 && nw.length===0) {
    const nextTs = all.map(i=>getSRS(i).due).filter(d=>d>now);
    const hrs = nextTs.length ? Math.ceil((Math.min(...nextTs)-now)/3600000) : 0;
    el.innerHTML = `<span class="srs-pill srs-done">✓ All reviewed${hrs ? ` · next in ${hrs}h` : ''}</span>`;
  } else {
    el.innerHTML =
      (due.length ? `<span class="srs-pill srs-due">📅 ${due.length} due</span>` : '') +
      (due.length && nw.length ? `<span class="srs-sep">·</span>` : '') +
      (nw.length  ? `<span class="srs-pill srs-new">✨ ${nw.length} new</span>` : '');
  }
}

function switchChapter(n) {
  if (n === currentChapter) return;
  currentChapter = n;
  document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`ch-btn-${n}`).classList.add('active');
  againWords = []; goodCount = 0; idx = 0;
  wlSelected.clear();
  buildQueue();
  resetCardHTML();
  loadCard();
}

/* ─────────────────── QUEUE ─────────────────── */
function shuffle(a) {
  a = [...a];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function buildQueue(indices) {
  if (indices !== undefined) {
    queue = shuffleMode ? shuffle([...indices]) : [...indices];
    updateSrsStats(); return;
  }
  const now = Date.now(), all = WORDS().map((_,i) => i);
  const due = all.filter(i => { const s=getSRS(i); return s.reps>0 && s.due<=now; });
  const nw  = all.filter(i => getSRS(i).reps===0);
  let src = [...due, ...nw];
  if (src.length === 0) src = [...all];
  queue = shuffleMode ? shuffle(src) : src;
  updateSrsStats();
}

function loadCard() {
  if (idx >= queue.length) { showDone(); return; }
  const w = WORDS()[queue[idx]];
  revealed = false; activeTab = null; hwWriters = [];

  const pinyinEl = document.getElementById('pinyin');
  const hanziEl  = document.getElementById('hanzi');
  const revAns   = document.getElementById('reveal-answer');

  if (studyMode === 'hanzi') {
    pinyinEl.textContent = w.hanzi;
    pinyinEl.classList.add('hanzi-mode');
    document.getElementById('pos').textContent     = '';
    document.getElementById('english').textContent = '';
    hanziEl.style.display = 'none';
    if (revAns) {
      revAns.innerHTML = `<div class="rev-pinyin">${colorPinyin(w.pinyin)}</div><div class="rev-pos">${w.pos}</div><div class="rev-english">${w.english}</div>`;
      revAns.style.display = 'none';
    }
  } else {
    pinyinEl.innerHTML = colorPinyin(w.pinyin);

    document.getElementById('pos').textContent     = w.pos;
    document.getElementById('english').textContent = showEnglish ? w.english : '';
    hanziEl.textContent   = w.hanzi;

  }

  const _ah = document.getElementById('answer-hint');
  if (_ah) _ah.style.display = '';
  const _aa = document.getElementById('answer-area');
  if (_aa) _aa.classList.remove('revealed');
  const _br = document.getElementById('btn-reveal');
  if (_br) { _br.disabled = false; _br.textContent = typingMode ? 'Check Answer' : 'Reveal Answer'; }
  document.getElementById('rating-row').classList.remove('visible');
  document.getElementById('tab-bar').classList.remove('visible');
  document.getElementById('tab-content').classList.remove('visible');
  document.getElementById('tab-content').innerHTML = '';
  document.getElementById('key-hint').textContent = typingMode ? 'Enter — check answer' : 'Space / Enter — reveal';
  const _cepL = document.getElementById('card-ex-preview');
  if (_cepL) _cepL.classList.remove('show');
  const _shL = document.getElementById('swipe-hint');
  if (_shL) _shL.textContent = '';
  if (typingMode) setTimeout(() => { const inp = document.getElementById('type-input'); if (inp) inp.focus(); }, 80);

  const pct = (idx / queue.length) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${idx+1} / ${queue.length}`;
  drawOpen = false; drawEraseMode = false; drawLocked = true;
  drawStrokes = []; drawEl = null;
  const _dw = document.getElementById('draw-wrap');
  const _db = document.getElementById('draw-toggle-btn');
  if (_dw) _dw.style.display = 'none';
  if (_db) { _db.textContent = '✏️ Draw'; _db.classList.remove('open'); }
}

/* ─────────────────── REVEAL (toggle) ─────────────────── */

    document.getElementById('tab-bar').classList.remove('visible');
    document.getElementById('tab-content').classList.remove('visible');

/* ─────────────────── RATE ─────────────────── */
function rate(result) {
  const wi = queue[idx];
  setSRS(wi, result === 'good');
  if (result === 'again') { if (!againWords.includes(wi)) againWords.push(wi); }
  else goodCount++;
  idx++;
  updateSrsStats();
  loadCard();
}

/* ─────────────────── TABS ─────────────────── */
function switchTab(tab) {
  // toggle off
  if (activeTab === tab) {
    activeTab = null;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-content').classList.remove('visible');
    document.getElementById('tab-content').innerHTML = '';
    hwWriters = [];
    return;
  }
  activeTab = tab;
  hwWriters = [];
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab)
  );
  const content = document.getElementById('tab-content');
  content.innerHTML = '';
  content.classList.add('visible');

  if (tab === 'strokes')  buildStrokesTab(content);
  if (tab === 'examples') buildExamplesTab(content);
  if (tab === 'practice') buildPracticeTab(content);
}

/* — Strokes tab — */
function buildStrokesTab(content) {
  const w     = WORDS()[queue[idx]];
  const chars = [...w.hanzi];
  const inner = document.createElement('div');
  inner.className = 'stroke-inner';

  const row = document.createElement('div');
  row.className = 'stroke-chars';

  chars.forEach((char, i) => {
    const box    = document.createElement('div'); box.className = 'stroke-char-box';
    const target = document.createElement('div'); target.id = `hw-${i}`;
    const label  = document.createElement('div'); label.className = 'stroke-char-label'; label.textContent = char;
    box.appendChild(target); box.appendChild(label); row.appendChild(box);
  });

  const actions = document.createElement('div'); actions.className = 'stroke-actions';
  const replay  = document.createElement('button'); replay.className = 'stroke-act-btn'; replay.textContent = '▶ Replay';
  replay.onclick = () => hwWriters.forEach(hw => hw && hw.animateCharacter());

  let outlineOn = true;
  const outBtn = document.createElement('button'); outBtn.className = 'stroke-act-btn'; outBtn.textContent = '◻ Outline';
  outBtn.onclick = () => {
    outlineOn = !outlineOn;
    outBtn.textContent = outlineOn ? '◻ Outline' : '◼ Outline';
    hwWriters.forEach(hw => { if (!hw) return; outlineOn ? hw.showOutline() : hw.hideOutline(); });
  };

  actions.appendChild(replay); actions.appendChild(outBtn);
  inner.appendChild(row); inner.appendChild(actions);
  content.appendChild(inner);

  chars.forEach((char, i) => {
    try {
      const hw = HanziWriter.create(`hw-${i}`, char, {
        width:100, height:100, padding:8, showOutline:true,
        strokeColor:'#c9b8ff', outlineColor:'#3a3650', highlightColor:'#f0eeff',
        strokeAnimationSpeed:.8, delayBetweenStrokes:250, renderer:'svg',
      });
      hw.animateCharacter();
      hwWriters[i] = hw;
    } catch(e) {
      const el = document.getElementById(`hw-${i}`);
      if (el) el.innerHTML = `<div style="width:100px;height:100px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#5a5870;border-radius:8px;background:#1a1a24;">No data</div>`;
      hwWriters[i] = null;
    }
  });
}

/* — Practice tab — */
function buildPracticeTab(content) {

async function detectServer() {
  const hint = document.getElementById('server-hint');
  if (!hint) return;
  if (!API_BASE) {
    hint.innerHTML = 'AI checking is only available on the local version.';
    const btn = document.getElementById('btn-check');
    if (btn) btn.disabled = true;
    return;
  }
  try {
    const r = await fetch(`${API_BASE}/check`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({sentence:'ping', word:'ping', pinyin:'', english:'', ping:true}),
      signal: AbortSignal.timeout(1500)
    });
    if (r.ok) { hint.textContent = 'AI ready ✓'; hint.style.color = '#80d080'; }
    else       { setServerHint(hint); }
  } catch {
    setServerHint(hint);
  }
}

function setServerHint(el) {
  el.innerHTML = 'Run <code style="background:#1e1c2e;padding:1px 4px;border-radius:4px;">python3 chinese_practice_server.py</code> to enable AI.';
}

async function checkSentence() {
  if (!API_BASE) return;
  const w        = WORDS()[queue[idx]];
  const sentence = (document.getElementById('my-sentence')?.value || '').trim();
  const respBox  = document.getElementById('ai-response');
  const btn      = document.getElementById('btn-check');
  if (!sentence || !respBox) return;

  respBox.className = 'ai-response visible';
  respBox.innerHTML = '<div class="ai-loading">Checking your sentence…</div>';
  btn.disabled = true;

  try {
    const r = await fetch(`${API_BASE}/check`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ sentence, word: w.hanzi, pinyin: w.pinyin, english: w.english }),
      signal: AbortSignal.timeout(15000)
    });
    const data = await r.json();

    if (data.error === 'no_key') {
      respBox.innerHTML = `<div class="ai-error">⚠️ No API key set. Add ANTHROPIC_API_KEY to the server and restart.</div>`;
    } else if (data.error) {
      respBox.innerHTML = `<div class="ai-error">⚠️ ${data.message || 'Error contacting AI.'}</div>`;
    } else {
      renderAIResponse(respBox, data.result);
    }
  } catch(e) {
    respBox.innerHTML = `<div class="ai-error">⚠️ Cannot reach server. Make sure <code>chinese_practice_server.py</code> is running.</div>`;
  }
  btn.disabled = false;
}

function renderAIResponse(box, text) {
  // Parse the structured response: RATING / CORRECTED / FEEDBACK lines
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  let ratingLine = '', correctedLine = '', feedbackLines = [];

  lines.forEach(l => {
    if      (l.startsWith('RATING:'))    ratingLine    = l.replace('RATING:', '').trim();
    else if (l.startsWith('CORRECTED:')) correctedLine = l.replace('CORRECTED:', '').trim();
    else if (l.startsWith('FEEDBACK:'))  feedbackLines.push(l.replace('FEEDBACK:', '').trim());
    else                                 feedbackLines.push(l);
  });

  const ratingClass = ratingLine.includes('✓') ? 'correct' : ratingLine.includes('≈') ? 'almost' : 'error';

  let html = '';
  if (ratingLine)   html += `<div class="ai-rating ${ratingClass}">${ratingLine}</div>`;
  if (correctedLine && correctedLine !== '—')
    html += `<div class="ai-corrected">${correctedLine}</div>`;
  if (feedbackLines.length)
    html += `<div class="ai-feedback">${feedbackLines.join(' ')}</div>`;

  // Fallback: render raw text if parsing failed
  if (!html) html = `<div class="ai-feedback">${text.replace(/\n/g,'<br>')}</div>`;

  box.innerHTML = html;
}

/* — Draw canvas — */
function drawInkColor() {
  if (drawColorIdx === 0) return drawTheme === 'dark' ? '#f0eeff' : '#1a0a2e';
  return DRAW_PALETTE[drawColorIdx];
}

function toggleDraw() {
  drawOpen = !drawOpen;
  const wrap = document.getElementById('draw-wrap');
  const btn  = document.getElementById('draw-toggle-btn');
  if (drawOpen) {
    wrap.style.display = '';
    btn.textContent = '✏️ Hide Canvas';
    btn.classList.add('open');
    drawLocked = false; // auto-enable drawing when canvas opens
    initDrawCanvas(); // sets touchAction:none, cursor:crosshair, syncs lock button
  } else {
    wrap.style.display = 'none';
    btn.textContent = '✏️ Draw';
    btn.classList.remove('open');
  }
}

function initDrawCanvas() {
  requestAnimationFrame(() => {
    const canvas = document.getElementById('draw-canvas');
    if (!canvas) return;
    drawStrokes = []; drawCurrent = null;

    // Sync toolbar button states (survives resetCardHTML)
    const gridBtn  = document.getElementById('draw-grid-btn');
    const themeBtn = document.getElementById('draw-theme-btn');
    const gridLabels = { none:'田 Grid', tian:'田 Tian', mi:'米 Mi' };
    if (gridBtn)  gridBtn.textContent  = gridLabels[drawGridMode];
    if (gridBtn)  gridBtn.classList.toggle('active', drawGridMode !== 'none');
    if (themeBtn) themeBtn.textContent = drawTheme === 'dark' ? '◑ Dark' : '◑ Light';
    if (themeBtn) themeBtn.classList.toggle('active', drawTheme === 'light');
    ['s','m','l'].forEach(k => {
      const b = document.getElementById(`dsz-${k}`);
      if (b) b.classList.toggle('active', (k==='s'&&drawStrokeSize===2)||(k==='m'&&drawStrokeSize===4)||(k==='l'&&drawStrokeSize===7));
    });
    const eraseBtn = document.getElementById('draw-erase-btn');
    if (eraseBtn) { eraseBtn.classList.toggle('active', drawEraseMode); eraseBtn.textContent = drawEraseMode ? '✏️ Draw' : '◯ Eraser'; }
    document.querySelectorAll('.draw-color-btn').forEach((b, i) => b.classList.toggle('active', i === drawColorIdx));
    const refBtn = document.getElementById('draw-ref-btn');
    if (refBtn) refBtn.classList.toggle('active', drawShowRef);

    if (drawEl !== canvas) {
      drawEl = canvas;
      const size = drawEl.offsetWidth;
      drawEl.width  = size;
      drawEl.height = size;
      drawCtx = drawEl.getContext('2d');

      drawEl.addEventListener('pointerdown', e => {
        if (drawLocked) return;
        e.preventDefault();
        const p = drawXY(e);
        drawCurrent = [p];
        if (drawEraseMode) {
          drawCtx.globalCompositeOperation = 'destination-out';
          drawCtx.strokeStyle = 'rgba(0,0,0,1)';
          drawCtx.lineWidth   = drawStrokeSize * 3;
        } else {
          drawCtx.globalCompositeOperation = 'source-over';
          drawCtx.strokeStyle = drawInkColor();
          drawCtx.lineWidth   = drawStrokeSize;
        }
        drawCtx.lineCap  = 'round';
        drawCtx.lineJoin = 'round';
        drawCtx.beginPath();
        drawCtx.moveTo(p.x, p.y);
      });

      drawEl.addEventListener('pointermove', e => {
        if (!drawCurrent || drawLocked) return;
        e.preventDefault();
        const p = drawXY(e);
        drawCurrent.push(p);
        const n = drawCurrent.length;
        if (n >= 3) {
          const p1 = drawCurrent[n-2], p2 = drawCurrent[n-1], p0 = drawCurrent[n-3];
          const mid1 = {x:(p0.x+p1.x)/2, y:(p0.y+p1.y)/2};
          const mid2 = {x:(p1.x+p2.x)/2, y:(p1.y+p2.y)/2};
          drawCtx.beginPath();
          drawCtx.moveTo(mid1.x, mid1.y);
          drawCtx.quadraticCurveTo(p1.x, p1.y, mid2.x, mid2.y);
          drawCtx.stroke();
        } else {
          drawCtx.lineTo(p.x, p.y);
          drawCtx.stroke();
          drawCtx.beginPath();
          drawCtx.moveTo(p.x, p.y);
        }
      });

      const end = () => {
        if (drawCurrent && drawCurrent.length > 1)
          drawStrokes.push({ pts: drawCurrent, erase: drawEraseMode, color: drawInkColor(), size: drawEraseMode ? drawStrokeSize * 3 : drawStrokeSize });
        drawCtx.globalCompositeOperation = 'source-over';
        drawCurrent = null;
      };
      drawEl.addEventListener('pointerup',     end);
      drawEl.addEventListener('pointercancel', end);
    }

    drawEl.style.background = drawTheme === 'dark' ? '#07070d' : '#f8f6ff';
    drawEl.style.touchAction = drawLocked ? 'auto' : 'none';
    drawEl.style.cursor = drawLocked ? 'default' : 'crosshair';
    const lockBtn = document.getElementById('draw-lock-btn');
    if (lockBtn) { lockBtn.textContent = drawLocked ? '✏️ Draw' : '🔒 Lock'; lockBtn.classList.toggle('active', !drawLocked); }
    drawPaint();
  });
}

function toggleDrawLock() {
  drawLocked = !drawLocked;
  if (drawEl) {
    drawEl.style.touchAction = drawLocked ? 'auto' : 'none';
    drawEl.style.cursor = drawLocked ? 'default' : 'crosshair';
  }
  const btn = document.getElementById('draw-lock-btn');
  if (btn) { btn.textContent = drawLocked ? '✏️ Draw' : '🔒 Lock'; btn.classList.toggle('active', !drawLocked); }
  if (drawLocked) { drawCurrent = null; }
}

function drawXY(e) {
  const r  = drawEl.getBoundingClientRect();
  const sx = drawEl.width  / r.width;
  const sy = drawEl.height / r.height;
  return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
}

function paintGrid(s) {
  if (drawGridMode === 'none') return;
  const gc = drawTheme === 'dark' ? 'rgba(90,70,140,0.55)' : 'rgba(150,120,200,0.45)';
  drawCtx.save();
  drawCtx.strokeStyle = gc; drawCtx.lineWidth = 1;
  drawCtx.setLineDash([5, 4]);
  drawCtx.strokeRect(3, 3, s-6, s-6);
  drawCtx.beginPath();
  drawCtx.moveTo(s/2, 3);   drawCtx.lineTo(s/2, s-3);
  drawCtx.moveTo(3, s/2);   drawCtx.lineTo(s-3, s/2);
  if (drawGridMode === 'mi') {
    drawCtx.moveTo(3, 3);     drawCtx.lineTo(s-3, s-3);
    drawCtx.moveTo(s-3, 3);   drawCtx.lineTo(3, s-3);
  }
  drawCtx.stroke();
  drawCtx.restore();
}

function drawPaint() {
  if (!drawCtx || !drawEl) return;
  const s = drawEl.width;
  drawCtx.clearRect(0, 0, s, s);
  paintGrid(s);
  paintRef(s);
  drawStrokes.forEach(stroke => {
    const pts = Array.isArray(stroke) ? stroke : stroke.pts;
    if (!pts || pts.length < 2) return;
    drawCtx.save();
    if (!Array.isArray(stroke) && stroke.erase) {
      drawCtx.globalCompositeOperation = 'destination-out';
      drawCtx.strokeStyle = 'rgba(0,0,0,1)';
      drawCtx.lineWidth   = stroke.size || drawStrokeSize * 3;
    } else {
      drawCtx.globalCompositeOperation = 'source-over';
      drawCtx.strokeStyle = stroke.color || drawInkColor();
      drawCtx.lineWidth   = stroke.size || drawStrokeSize;
    }
    drawCtx.lineCap  = 'round';
    drawCtx.lineJoin = 'round';
    drawCtx.beginPath();
    drawCtx.moveTo(pts[0].x, pts[0].y);
    if (pts.length === 2) {
      drawCtx.lineTo(pts[1].x, pts[1].y);
    } else {
      for (let i = 1; i < pts.length - 1; i++) {
        const mx = (pts[i].x + pts[i+1].x) / 2;
        const my = (pts[i].y + pts[i+1].y) / 2;
        drawCtx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
      }
      drawCtx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
    }
    drawCtx.stroke();
    drawCtx.restore();
  });
}

function paintRef(s) {
  if (!drawShowRef || queue[idx] === undefined) return;
  const word = WORDS()[queue[idx]];
  if (!word || !word.hanzi) return;
  drawCtx.save();
  drawCtx.font = `bold ${Math.round(s * 0.55)}px serif`;
  drawCtx.textAlign = 'center';
  drawCtx.textBaseline = 'middle';
  drawCtx.fillStyle = drawTheme === 'dark' ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.09)';
  drawCtx.fillText(word.hanzi, s / 2, s / 2, s * 0.88);
  drawCtx.restore();
}

function setDrawColor(idx) {
  drawColorIdx = idx;
  drawEraseMode = false;
  document.querySelectorAll('.draw-color-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  const eraseBtn = document.getElementById('draw-erase-btn');
  if (eraseBtn) { eraseBtn.classList.remove('active'); eraseBtn.textContent = '◯ Eraser'; }
}

function toggleDrawRef() {
  drawShowRef = !drawShowRef;
  const btn = document.getElementById('draw-ref-btn');
  if (btn) btn.classList.toggle('active', drawShowRef);
  drawPaint();
}

function drawUndo()  { drawStrokes.pop(); drawPaint(); }
function drawClear() { drawStrokes = []; drawCurrent = null; drawPaint(); }
function toggleEraser() {
  drawEraseMode = !drawEraseMode;
  const btn = document.getElementById('draw-erase-btn');
  if (btn) {
    btn.classList.toggle('active', drawEraseMode);
    btn.textContent = drawEraseMode ? '✏️ Draw' : '◯ Eraser';
  }
}

function cycleDrawGrid() {
  const cycle  = { none:'tian', tian:'mi', mi:'none' };
  const labels = { none:'田 Grid', tian:'田 Tian', mi:'米 Mi' };
  drawGridMode = cycle[drawGridMode];
  const btn = document.getElementById('draw-grid-btn');
  if (btn) { btn.textContent = labels[drawGridMode]; btn.classList.toggle('active', drawGridMode !== 'none'); }
  drawPaint();
}

function toggleDrawTheme() {
  drawTheme = drawTheme === 'dark' ? 'light' : 'dark';
  if (drawEl) drawEl.style.background = drawTheme === 'dark' ? '#07070d' : '#f8f6ff';
  const btn = document.getElementById('draw-theme-btn');
  if (btn) { btn.textContent = drawTheme === 'dark' ? '◑ Dark' : '◑ Light'; btn.classList.toggle('active', drawTheme === 'light'); }
  drawPaint();
}

function setDrawSize(size, key) {
  drawStrokeSize = size;
  document.querySelectorAll('.draw-size-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(`dsz-${key}`);
  if (btn) btn.classList.add('active');
}

/* ─────────────────── AUDIO ─────────────────── */
/* ── TTS: pick the best available Mandarin voice ── */
let _zhVoice = null;
let _voicesLoaded = false;

function pickBestVoice() {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return null;
  /* Priority list — neural / natural voices first */
  const priority = [
    'Microsoft Xiaoxiao Online (Natural)',   // Edge — best quality
    'Microsoft Yunxi Online (Natural)',
    'Microsoft Xiaoyi Online (Natural)',
    'Microsoft Xiaoxiao',
    'Microsoft Yunxi',
    'Microsoft Xiaoyi',
    'Tingting',           // macOS Enhanced
    'Mei-Jia',            // macOS Taiwan
    'Google 普通话（中国大陆）',
    'Google Chinese (Simplified)',
  ];
  for (const name of priority) {
    const v = voices.find(v => v.name.includes(name));
    if (v) return v;
  }
  /* Fallback: any zh-CN, then any zh */
  return voices.find(v => v.lang === 'zh-CN')
      || voices.find(v => v.lang.startsWith('zh-CN'))
      || voices.find(v => v.lang.startsWith('zh'))
      || null;
}

function getZhVoice() {
  if (_zhVoice) return _zhVoice;
  _zhVoice = pickBestVoice();
  return _zhVoice;
}

/* Re-pick when browser finishes loading voices (Chrome async) */
if (window.speechSynthesis) {
  window.speechSynthesis.addEventListener('voiceschanged', () => {
    _zhVoice = null;
    _zhVoice = pickBestVoice();
  });
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt   = new SpeechSynthesisUtterance(text);
  utt.lang    = 'zh-CN';
  const voice = getZhVoice();
  if (voice) utt.voice = voice;
  /* Natural-sounding settings */
  const isNeural = voice && (voice.name.includes('Natural') || voice.name.includes('Online'));
  utt.rate  = isNeural ? 1.0 : 0.82;   // neural voices need normal speed; robot voices need slower
  utt.pitch = 1.0;
  window.speechSynthesis.speak(utt);
}

function buildWlGrid() {
  const grid = document.getElementById('wl-grid');
  const toolbar = document.getElementById('wl-toolbar');
  const footer  = document.getElementById('wl-footer');
  grid.innerHTML = '';

  if (wlShowAll) {
    if (toolbar) toolbar.style.display = 'none';
    if (footer)  footer.style.display  = 'none';
    const chWords = [WORDS_CH1, WORDS_CH2, WORDS_CH3, WORDS_CH4, WORDS_CH5, WORDS_CH6];
    const chNames = ['上海的地铁', '为什么不快乐', '塞翁失马', '狼和鹿', '丽江的画', '终于结婚了'];
    chWords.forEach((words, ci) => {
      const ch = ci + 1;
      words.forEach((w, i) => {
        const s  = localStorage.getItem(`srs_ch${ch}_${i}`);
        const d  = s ? JSON.parse(s) : null;
        const st = !d || d.reps===0 ? 'new' : d.interval>=21 ? 'mastered' : d.interval>=7 ? 'review' : 'learning';
        const card = document.createElement('div');
        card.className = 'wl-card';
        card.innerHTML = `
          <div class="wl-ch-tag">Ch ${ch}</div>
          <div class="wl-hanzi">${w.hanzi}</div>
          <div class="wl-pinyin">${colorPinyin(w.pinyin)}</div>
          <div class="wl-english">${w.english}</div>
          <span class="srs-badge ${st}">${st}</span>`;
        grid.appendChild(card);
      });
    });
    return;
  }

  if (toolbar) toolbar.style.display = '';
  if (footer)  footer.style.display  = '';
  WORDS().forEach((w, i) => {
    const card = document.createElement('div');
    card.className = 'wl-card' +
      (wlSelected.has(i)      ? ' selected'     : '') +
      (againWords.includes(i) ? ' again-marked' : '');
    card.id = `wl-card-${i}`;
    card.onclick = () => toggleWlCard(i);
    const tag = againWords.includes(i) ? `<div class="wl-tag">again</div>` : '';
    const st = srsStatus(i);
    card.innerHTML = `
      <div class="wl-hanzi">${w.hanzi}</div>
      <div class="wl-pinyin">${colorPinyin(w.pinyin)}</div>
      <div class="wl-english">${w.english}</div>

}

/* ─────────────────── WORD LIST STROKES ─────────────────── */
function showWlStroke(i, event) {
  event.stopPropagation();
  if (wlStrokeActive === i) { closeWlStroke(); return; }
  if (wlStrokeActive >= 0) {
    document.getElementById(`wl-sbtn-${wlStrokeActive}`)?.classList.remove('active');
    document.getElementById(`wl-card-${wlStrokeActive}`)?.classList.remove('stroke-active');
  }
  wlStrokeActive = i;
  const w = WORDS()[i];
  document.getElementById(`wl-sbtn-${i}`).classList.add('active');
  document.getElementById(`wl-card-${i}`).classList.add('stroke-active');
  document.getElementById('wsp-hanzi').textContent  = w.hanzi;
  document.getElementById('wsp-pinyin').innerHTML   = colorPinyin(w.pinyin);
  document.getElementById('wsp-english').textContent = w.english;
  const preview = document.getElementById('wl-stroke-preview');
  preview.classList.add('visible');
  document.getElementById('wl-grid').style.maxHeight = '32vh';
  preview.scrollIntoView({ behavior:'smooth', block:'nearest' });

  const chars = [...w.hanzi];
  const charsEl = document.getElementById('wsp-chars');
  charsEl.innerHTML = '';
  wlHwWriters = [];

  chars.forEach((char, ci) => {
    const box = document.createElement('div'); box.className = 'wsp-char-box';
    const target = document.createElement('div'); target.id = `wsp-hw-${ci}`;
    const label = document.createElement('div'); label.className = 'wsp-char-label'; label.textContent = char;
    box.appendChild(target); box.appendChild(label); charsEl.appendChild(box);
  });

  chars.forEach((char, ci) => {
    try {
      const hw = HanziWriter.create(`wsp-hw-${ci}`, char, {
        width:80, height:80, padding:7, showOutline:true,
        strokeColor:'#c9b8ff', outlineColor:'#3a3650', highlightColor:'#f0eeff',
        strokeAnimationSpeed:.8, delayBetweenStrokes:250, renderer:'svg',
      });
      hw.animateCharacter(); wlHwWriters[ci] = hw;
    } catch(e) {
      const el = document.getElementById(`wsp-hw-${ci}`);
      if (el) el.innerHTML = `<div style="width:80px;height:80px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#5a5870;border-radius:7px;background:#1a1a24;">No data</div>`;
      wlHwWriters[ci] = null;
    }
  });
}

function closeWlStroke() {
  if (wlStrokeActive >= 0) {
    document.getElementById(`wl-sbtn-${wlStrokeActive}`)?.classList.remove('active');
    document.getElementById(`wl-card-${wlStrokeActive}`)?.classList.remove('stroke-active');
  }
  wlStrokeActive = -1; wlHwWriters = [];
  document.getElementById('wl-stroke-preview').classList.remove('visible');
  document.getElementById('wl-grid').style.maxHeight = '55vh';
}

function normPinyin(s) {
  return s.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/v/g, 'u').replace(/\s+/g, '');
}

function checkTypedAnswer() {
  if (!typingMode || idx >= queue.length) return;
  const w     = WORDS()[queue[idx]];
  const input = (document.getElementById('type-input')?.value || '').trim();
  if (!input) return;

  const correct = studyMode === 'hanzi'
    ? normPinyin(input) === normPinyin(w.pinyin)
    : input === w.hanzi;

  const result = document.getElementById('type-result');
  if (result) {
    result.className = 'type-result visible ' + (correct ? 'correct' : 'wrong');
    if (correct) {
      result.innerHTML = '✓ Correct!<span class="tr-answer">' +
        (studyMode === 'hanzi' ? colorPinyin(w.pinyin) : w.hanzi) + '</span>';
    } else {
      result.innerHTML = '✗ The answer is:<span class="tr-answer">' +
        (studyMode === 'hanzi' ? colorPinyin(w.pinyin) : w.hanzi) + '</span>';
    }
  }

  const inp = document.getElementById('type-input');
  if (inp) inp.disabled = true;
  const btn = document.getElementById('btn-reveal');
  if (btn) btn.disabled = true;

  revealed = true;
  speak(w.hanzi);
  document.getElementById('rating-row').classList.add('visible');
  document.getElementById('tab-bar').classList.add('visible');
  document.getElementById('key-hint').textContent = '1/← Again  ·  2/→ Got it  ·  F Search';
}

function openStats()  { buildStats(); document.getElementById('stats-modal').classList.add('open'); }
