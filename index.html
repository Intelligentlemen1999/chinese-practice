function buildStats() {
  const chWords = [WORDS_CH1, WORDS_CH2, WORDS_CH3, WORDS_CH4, WORDS_CH5, WORDS_CH6];
  const chNames = ['上海的地铁', '为什么不快乐', '塞翁失马', '狼和鹿', '丽江的画', '终于结婚了'];
  let tot = { new:0, learning:0, review:0, mastered:0 };

  const chData = chWords.map((words, ci) => {
    const ch = ci + 1;
    const st = { new:0, learning:0, review:0, mastered:0, total:words.length };
    words.forEach((_, i) => {
      const s = localStorage.getItem(`srs_ch${ch}_${i}`);
      const d = s ? JSON.parse(s) : null;
      if (!d || d.reps===0)   st.new++;
      else if (d.interval>=21) st.mastered++;
      else if (d.interval>=7)  st.review++;
      else                     st.learning++;
    });
    tot.new += st.new; tot.learning += st.learning;
    tot.review += st.review; tot.mastered += st.mastered;
    return { ch, name:chNames[ci], ...st };
  });

  const totalWords = tot.new + tot.learning + tot.review + tot.mastered;

  document.getElementById('stats-content').innerHTML = `
    <div class="stats-total"><strong>${tot.mastered + tot.review + tot.learning}</strong> / ${totalWords} words studied</div>
    <div class="stats-num-row">
      <div class="stats-num-box sn-mastered"><div class="sn-num">${tot.mastered}</div><div class="sn-lbl">Mastered</div></div>
      <div class="stats-num-box sn-review"><div class="sn-num">${tot.review}</div><div class="sn-lbl">Review</div></div>
      <div class="stats-num-box sn-learning"><div class="sn-num">${tot.learning}</div><div class="sn-lbl">Learning</div></div>
      <div class="stats-num-box sn-new"><div class="sn-num">${tot.new}</div><div class="sn-lbl">New</div></div>
    </div>
    <div class="stats-ch-list">
      ${chData.map(d => {
        const mPct = (d.mastered / d.total * 100).toFixed(1);
        const rPct = (d.review   / d.total * 100).toFixed(1);
        const lPct = (d.learning / d.total * 100).toFixed(1);
        return `<div class="stats-ch-item">
          <div class="stats-ch-label">
            <span>Ch ${d.ch} · ${d.name}</span>
            <span class="stats-ch-pct">${d.mastered + d.review + d.learning}/${d.total} studied</span>
          </div>
          <div class="stats-ch-bar">
            <div class="stats-bar-seg-m" style="width:${mPct}%"></div>
            <div class="stats-bar-seg-r" style="width:${rPct}%"></div>
            <div class="stats-bar-seg-l" style="width:${lPct}%"></div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div style="padding:0 16px 14px;display:flex;gap:14px;flex-wrap:wrap;">
      <span style="font-size:11px;color:#7a6aaa;display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;background:#7c5cbf;border-radius:50%;display:inline-block"></span>Mastered</span>
      <span style="font-size:11px;color:#7a6aaa;display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;background:#4aad7a;border-radius:50%;display:inline-block"></span>Review</span>
      <span style="font-size:11px;color:#7a6aaa;display:flex;align-items:center;gap:5px;"><span style="width:9px;height:9px;background:#d4943a;border-radius:50%;display:inline-block"></span>Learning</span>
    </div>
    <div class="backup-row">
      <button class="backup-btn" onclick="exportSRS()">⬇ Export Progress</button>
      <button class="backup-btn" onclick="document.getElementById('srs-import-file').click()">⬆ Import Progress</button>
    </div>
    <input type="file" id="srs-import-file" accept=".json" style="display:none" onchange="importSRS(event)">
    `;
}

let lessonCurrentTab = 'texts';

function openLesson() {
  const ch = currentChapter;

    alert('No lesson content yet for Chapter ' + ch + '.');
    return;
  }

function closeLesson() {

function lessonTab(tab) {

  document.querySelectorAll('.lesson-tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('ltab-' + tab).classList.add('active');
  renderLessonContent();

function renderLessonContent() {
  const ch = currentChapter;
  const lesson = LESSONS[ch];
  const container = document.getElementById('lesson-content');
  if (!lesson) { container.innerHTML = '<p style="color:#7a7888;padding:16px;">No lesson for this chapter yet.</p>'; return; }

  if (lessonCurrentTab === 'texts') {
    container.innerHTML = lesson.texts.map((text, ti) => `
      <div class="text-block">
        <div class="text-block-title">${text.num} ${text.title}</div>
        <div class="text-block-sub">${text.en}</div>
        ${text.paragraphs.map(p => `
          <div class="text-para-zh">${annotateVocab(p.zh)}</div>
          ${p.py ? `<div class="text-para-py">${p.py}</div>` : ''}
          <div class="text-para-en">${p.en}</div>
        `).join('')}
        ${text.source ? `<div class="text-source">${text.source}</div>` : ''}
      </div>
      ${ti < lesson.texts.length-1 ? '<hr style="border:none;border-top:1px solid #1e1c2e;margin:4px 0 20px;">' : ''}
    `).join('');

  } else if (lessonCurrentTab === 'grammar') {
    container.innerHTML = lesson.grammar.map((g, i) => `
      <div class="grammar-item">
        <div class="grammar-header" onclick="toggleGrammar(${i})" id="ghdr-${i}">
          <div>
            <span class="grammar-title-zh">${g.zh}</span>
            ${g.py ? `<span class="grammar-title-py">${g.py}</span>` : ''}
            <div class="grammar-title-en">${g.en}</div>
          </div>
          <span class="grammar-chevron" id="gchev-${i}">▾</span>
        </div>
        <div class="grammar-body" id="gbody-${i}">
          <div class="grammar-rule">${g.rule.replace(/\n/g,'<br>')}</div>
          ${g.note ? `<div class="grammar-note">${g.note}</div>` : ''}
          ${g.examples.map(ex => `
            <div class="grammar-example">
              <div class="grammar-ex-zh">${ex.zh}</div>
              <div class="grammar-ex-py">${ex.py}</div>
              <div class="grammar-ex-en">${ex.en}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');

  } else if (lessonCurrentTab === 'exercises') {
    let html = '';
    lesson.exercises.forEach((sec, si) => {
      html += `<div class="ex-section">`;
      html += `<div class="ex-section-title">${sec.title}</div>`;
      if (sec.hint) html += `<div class="ex-hint">${sec.hint}</div>`;
      if (sec.type === 'mc') {
        sec.items.forEach((item, ii) => {
          html += `<div class="ex-item">
            <div class="ex-item-q">${item.q}</div>
            <div class="mc-options">
              ${item.opts.map((opt, oi) => `
                <div class="mc-opt" onclick="mcAnswer(${si},${ii},${oi})" id="mc-${si}-${ii}-${oi}">${opt}</div>
              `).join('')}
            </div>
          </div>`;
        });
      } else if (sec.type === 'fill') {
        sec.items.forEach((item, ii) => {
          html += `<div class="ex-item"><div class="fill-wrap">
            ${item.pre ? `<span class="ex-item-q">${item.pre}</span>` : ''}
            <input class="fill-blank-input" id="fill-${si}-${ii}" placeholder="___"
              autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
              onkeydown="if(event.key==='Enter')checkFill(${si},${ii})">
            ${item.post ? `<span class="ex-item-q">${item.post}</span>` : ''}
            <button class="fill-check-btn" onclick="checkFill(${si},${ii})">✓</button>
          </div></div>`;
        });
      }
      html += `</div>`;
    });
    container.innerHTML = html;
  }
}

function toggleGrammar(i) {
  const body = document.getElementById('gbody-' + i);
  const hdr  = document.getElementById('ghdr-' + i);
  const open = body.classList.contains('gopen');
  body.classList.toggle('gopen', !open);
  hdr.classList.toggle('gopen', !open);
}

function mcAnswer(si, ii, oi) {
  const ch = currentChapter;
  const item = LESSONS[ch].exercises[si].items[ii];
  const opts = document.querySelectorAll(`[id^="mc-${si}-${ii}-"]`);
  opts.forEach((el, idx) => {
    el.classList.remove('correct','wrong');
    el.style.pointerEvents = 'none';
    if (idx === item.ans) el.classList.add('correct');
    else if (idx === oi && oi !== item.ans) el.classList.add('wrong');
  });
}

function checkFill(si, ii) {
  const ch = currentChapter;
  const item = LESSONS[ch].exercises[si].items[ii];
  const inp = document.getElementById(`fill-${si}-${ii}`);
  const val = inp.value.trim();
  const correct = val === item.answer;
  inp.classList.remove('correct','wrong');
  inp.classList.add(correct ? 'correct' : 'wrong');
  if (!correct) {
    setTimeout(() => {
      inp.value = item.answer;
      inp.classList.remove('wrong');
      inp.classList.add('correct');
    }, 1200);
  }
}

    if (e.key === 'Escape') closeLesson();

  }
  if (document.getElementById('wl-modal').classList.contains('open')) {
    if (e.key === 'Escape') closeWordList();
    return;
  }
  if (document.getElementById('stats-modal').classList.contains('open')) {
    if (e.key === 'Escape') closeStats();
    return;
  }
  if (document.getElementById('search-modal').classList.contains('open')) {
    if (e.key === 'Escape') closeSearch();
    return;
  }
  if (activeTab === 'draw') return;
  if (e.key === ' ' || e.key === 'Enter') {
    if (typingMode) return;
    e.preventDefault(); reveal();
  }
  if (e.key === 'ArrowRight' && revealed) rate('good');
  if (e.key === 'ArrowLeft'  && revealed) rate('again');
  if (e.key === '1' && revealed) rate('again');
  if (e.key === '2' && revealed) rate('good');
  if (e.key === 'f' || e.key === 'F') { if (!typingMode) { e.preventDefault(); openSearch(); } }
});

/* ─────────────────── INIT ─────────────────── */
buildQueue();
updateSrsStats();
loadCard();

/* ─────────────────── SWIPE GESTURES ─────────────────── */
(function() {
  const card = document.getElementById('main-card');
  let tx = 0, ty = 0;
  card.addEventListener('touchstart', e => {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
  }, { passive: true });
  card.addEventListener('touchend', e => {
    if (!revealed) return;
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx > 0) rate('good');
      else rate('again');
    }
  }, { passive: true });
})();

/* ─────────────────── VOCAB TAP-TO-DEFINE ─────────────────── */
function annotateVocab(text) {
  const words = WORDS();
  const sorted = [...words].sort((a, b) => b.hanzi.length - a.hanzi.length);
  const marks = {};
  sorted.forEach((w, i) => {
    if (text.includes(w.hanzi)) {
      text = text.split(w.hanzi).join('\x00' + i + '\x00');
      marks[i] = w;
    }
  });
  Object.keys(marks).forEach(i => {
    const w = marks[i];
    const py = w.pinyin.replace(/'/g, '&apos;');
    const en = w.english.replace(/'/g, '&apos;').replace(/"/g, '&quot;');
    const pos = w.pos.replace(/'/g, '&apos;');
    text = text.split('\x00' + i + '\x00').join(
      `<span class="vocab-hl" onclick="showVocabPop(event,'${w.hanzi}','${py}','${pos}','${en}')">${w.hanzi}</span>`
    );
  });
  return text;
}

function showVocabPop(e, hanzi, py, pos, en) {
  e.stopPropagation();
  const pop = document.getElementById('vocab-popup');
  document.getElementById('vp-hanzi').textContent  = hanzi;
  document.getElementById('vp-pinyin').innerHTML   = colorPinyin(py);
  document.getElementById('vp-pos').textContent    = pos;
  document.getElementById('vp-en').textContent     = en;
  const rect = e.target.getBoundingClientRect();
  const pw = 200, ph = 110;
  let left = rect.left + window.scrollX;
  let top  = rect.bottom + window.scrollY + 6;
  if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
  if (top + ph > window.scrollY + window.innerHeight - 8) top = rect.top + window.scrollY - ph - 6;
  pop.style.left = left + 'px';
  pop.style.top  = top  + 'px';
  pop.classList.add('show');
}

function closeVocabPop() {
  document.getElementById('vocab-popup').classList.remove('show');
}

document.addEventListener('click', e => {
  const pop = document.getElementById('vocab-popup');
  if (pop.classList.contains('show') && !pop.contains(e.target) && !e.target.classList.contains('vocab-hl')) {
    pop.classList.remove('show');
  }
});

/* ─────────────────── STREAK ─────────────────── */
function todayStr() { return new Date().toISOString().slice(0,10); }
function loadStreak() {
  const last  = localStorage.getItem('streak_last')  || '';
  const count = parseInt(localStorage.getItem('streak_count') || '0', 10);
  const today = todayStr();
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (last === today) return count;
  if (last === yesterday) return count; // still alive, will increment on next study
  if (last === '') return 0;
  return 0; // broken
}
function bumpStreak() {
  const today = todayStr();
  const last  = localStorage.getItem('streak_last') || '';
  if (last === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  const cur = parseInt(localStorage.getItem('streak_count') || '0', 10);
  const next = (last === yesterday || last === '') ? cur + 1 : 1;
  localStorage.setItem('streak_count', next);
  localStorage.setItem('streak_last', today);
  renderStreak();
}
function renderStreak() {
  const el = document.getElementById('streak-badge');
  if (!el) return;
  const count = loadStreak();
  if (count === 0) { el.style.display = 'none'; return; }
  el.style.display = 'inline-flex';
  el.classList.toggle('dead', count === 0);
  el.innerHTML = `🔥 ${count} day${count !== 1 ? 's' : ''}`;
}

/* ─────────────────── DUE REVIEW MODE ─────────────────── */
function startDueReview() {
  const now = Date.now(), all = WORDS().map((_,i) => i);
  const due = all.filter(i => { const s = getSRS(i); return s.reps > 0 && s.due <= now; });
  if (due.length === 0) {
    const nxt = all.map(i => getSRS(i).due).filter(d => d > now).sort((a,b)=>a-b);
    const msg = nxt.length
      ? `No cards due — next review in ${Math.ceil((nxt[0]-now)/3600000)}h`
      : 'No reviewed cards yet — keep studying!';
    alert(msg); return;
  }
  againWords = []; goodCount = 0; idx = 0;
  buildQueue(due);
  resetCardHTML();
  loadCard();
}

/* ─────────────────── SEARCH ─────────────────── */
const ALL_CHAPTERS_DATA = [
  { ch:1, words: WORDS_CH1 }, { ch:2, words: WORDS_CH2 },
  { ch:3, words: WORDS_CH3 }, { ch:4, words: WORDS_CH4 },
  { ch:5, words: WORDS_CH5 }, { ch:6, words: WORDS_CH6 },
];
function openSearch() {
  document.getElementById('search-modal').classList.add('open');
  setTimeout(() => document.getElementById('search-input').focus(), 80);
}
function closeSearch() {
  document.getElementById('search-modal').classList.remove('open');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '<div class="search-empty">Type to search all 6 chapters</div>';
}
function doSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const res = document.getElementById('search-results');
  if (!q) { res.innerHTML = '<div class="search-empty">Type to search all 6 chapters</div>'; return; }
  const hits = [];
  ALL_CHAPTERS_DATA.forEach(({ch, words}) => {
    words.forEach((w, i) => {
      const py = (w.py || w.pinyin || '').toLowerCase();
      const en = (w.en || w.english || '').toLowerCase();
      if (w.hanzi.includes(q) || py.includes(q) || en.includes(q)) {
        hits.push({ ch, i, w });
      }
    });
  });
  if (hits.length === 0) { res.innerHTML = '<div class="search-empty">No results found</div>'; return; }
  res.innerHTML = hits.map(({ch, i, w}) => {
    const py = w.py || w.pinyin || '';
    const en = w.en || w.english || '';
    const pos = w.pos || '';
    return `<div class="search-result-item" onclick="jumpToWord(${ch},${i})">
      <span class="sr-hanzi">${w.hanzi}</span>
      <span style="flex:1;min-width:0">
        <div class="sr-py">${py}</div>
        <div class="sr-en">${pos} ${en}</div>
      </span>
      <span class="sr-ch">Ch ${ch}</span>
    </div>`;
  }).join('');
}
function jumpToWord(ch, wi) {
  closeSearch();
  if (ch !== currentChapter) switchChapter(ch);
  // find wi in queue and jump
  const pos = queue.indexOf(wi);
  if (pos !== -1) { idx = pos; }
  else { queue.unshift(wi); idx = 0; }
  resetCardHTML(); loadCard();
}

/* ─────────────────── SRS EXPORT / IMPORT ─────────────────── */
function exportSRS() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith('srs_')) data[k] = localStorage.getItem(k);
  }
  data['streak_count'] = localStorage.getItem('streak_count') || '0';
  data['streak_last']  = localStorage.getItem('streak_last')  || '';
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `chinese-srs-backup-${todayStr()}.json`;
  a.click();
}
function importSRS(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      let count = 0;
      Object.entries(data).forEach(([k, v]) => {
        if (k.startsWith('srs_') || k === 'streak_count' || k === 'streak_last') {
          localStorage.setItem(k, v); count++;
        }
      });
      updateSrsStats(); renderStreak(); buildStats();
      alert(`Imported ${count} entries successfully!`);
    } catch { alert('Invalid backup file.'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}

/* ─────────────────── CONFETTI ─────────────────── */
function fireConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.style.display = 'block';
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#c9b8ff','#7c5cbf','#4aad7a','#f0c060','#f08080','#74d7f7'];
  const pieces = Array.from({length:80}, () => ({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 100,
    r: 4 + Math.random() * 5,
    c: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 4,
    vy: 3 + Math.random() * 4,
    rot: Math.random() * 360,
    vrot: (Math.random() - 0.5) * 8,
    alpha: 1,
  }));
  let frame;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vrot;
      if (p.y > canvas.height * 0.7) p.alpha -= 0.025;
      if (p.alpha > 0) { alive = true; }
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.c;
      ctx.fillRect(-p.r, -p.r/2, p.r*2, p.r);
      ctx.restore();
    });
    if (alive) { frame = requestAnimationFrame(draw); }
    else { canvas.style.display = 'none'; ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  cancelAnimationFrame(frame);
  draw();
}

/* ─────────────────── KEYBOARD SHORTCUTS (1/2 for again/good) ─────────────────── */
// Patch rate() to also handle streak + mastery celebration
const _origRate = rate;
rate = function(result) {
  const wi = queue[idx];
  const wasMastered = srsStatus(wi) === 'mastered';
  _origRate(result);
  bumpStreak();
  if (!wasMastered && result === 'good' && srsStatus(wi) === 'mastered') {
    fireConfetti();
  }
};

/* Init streak on load */
renderStreak();
